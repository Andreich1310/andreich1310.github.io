<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Doors</title>

<style>

:root{
 --gap-start:.5;
 --gap-end:50;
}

html,body{
 height:100%;
 margin:0;
 overflow:hidden;
 font-family:system-ui;
}

.hero{
 position:fixed;
 inset:0;
 display:flex;
 perspective:1000px;
 z-index:100;
 transition:opacity .35s cubic-bezier(.22,.61,.36,1);
 touch-action:none;
}

.door{
 width:50%;
 height:100%;
 position:relative;
 transform-style:preserve-3d;
 will-change:transform;
}

.left{ transform-origin:right center; }
.right{ transform-origin:left center; }

.panel{
 position:absolute;
 inset:0;
 transform-style:preserve-3d;
}

.left .panel{ transform-origin:right bottom; }
.right .panel{ transform-origin:left bottom; }

.panel::before{
 content:"";
 position:absolute;
 inset:0;
 border:1px solid rgba(0,0,0,.08);
 pointer-events:none;
 z-index:5;
}

.panel img{
 width:200%;
 height:100%;
 object-fit:cover;
 position:absolute;
 top:0;
}

.left img{ left:0; }
.right img{ right:0; }

.door-shadow{
 position:absolute;
 top:0;
 bottom:0;
 width:10vw;
 filter:blur(18px);
 opacity:.9;
 pointer-events:none;
}

.left .door-shadow{
 right:-6vw;
 background:linear-gradient(to right,rgba(0,0,0,.7),transparent);
}

.right .door-shadow{
 left:-6vw;
 background:linear-gradient(to left,rgba(0,0,0,.7),transparent);
}

.slider{
 position:relative;
 height:100vh;
 overflow-y:auto;
 scroll-snap-type:y mandatory;
}

.slide{
 height:100vh;
 scroll-snap-align:start;
}

.slide img{
 width:100%;
 height:100%;
 object-fit:cover;
}

</style>
</head>

<body>

<div class="hero" id="hero">

 <div class="door left" id="leftDoor">
  <div class="panel">
   <div class="door-shadow"></div>
   <img src="Обложка web.svg">
  </div>
 </div>

 <div class="door right" id="rightDoor">
  <div class="panel">
   <div class="door-shadow"></div>
   <img src="Обложка web.svg">
  </div>
 </div>

</div>

<div class="slider" id="slider">

 <section class="slide">
  <img src="center.svg">
 </section>

 <section class="slide">
  <img src="Левая web.svg">
 </section>

 <section class="slide">
  <img src="Правая web.svg">
 </section>

</div>

<script>

const hero = document.getElementById('hero')
const leftDoor = document.getElementById('leftDoor')
const rightDoor = document.getElementById('rightDoor')

const leftPanel = leftDoor.querySelector('.panel')
const rightPanel = rightDoor.querySelector('.panel')

const slider = document.getElementById('slider')

let progress = 0
let isDragging = false

let startY = 0
let startProgress = 0

let lastMoveTime = 0
let lastMoveY = 0
let velocity = 0

const clamp = v => Math.max(0,Math.min(1,v))

const gapStart = .5
const gapEnd = 50
const rot = 38

function render(p){

 progress = clamp(p)

 const shift = gapStart + progress*(gapEnd-gapStart)

 const depth = progress*80
 const tilt = -progress*6
 const scaleY = 1+progress*.12

 leftDoor.style.transform =
 `translateX(${-shift}vw)
  rotateY(${-progress*rot}deg)
  translateZ(${-depth}px)
  rotateX(${tilt}deg)`

 rightDoor.style.transform =
 `translateX(${shift}vw)
  rotateY(${progress*rot}deg)
  translateZ(${-depth}px)
  rotateX(${tilt}deg)`

 leftPanel.style.transform=`scaleY(${scaleY})`
 rightPanel.style.transform=`scaleY(${scaleY})`

 hero.style.opacity = 1-progress

 if(progress>.98){

  hero.style.pointerEvents="none"
  slider.style.pointerEvents="auto"
  slider.style.overflowY="auto"

 }else{

  hero.style.pointerEvents="auto"
  slider.style.pointerEvents="none"
  slider.style.overflowY="hidden"

 }

}

function animateTo(target){

 const from = progress

 const start = performance.now()

 function frame(now){

  let t = (now-start)/420
  if(t>1)t=1

  /* Apple-like easing */
  const ease = 1-Math.pow(1-t,4)

  render(from+(target-from)*ease)

  if(t<1)requestAnimationFrame(frame)

 }

 requestAnimationFrame(frame)

}

window.addEventListener("pointerdown",e=>{

 isDragging=true
 startY=e.clientY
 startProgress=progress

 lastMoveTime=performance.now()
 lastMoveY=e.clientY
 velocity=0

})

window.addEventListener("pointermove",e=>{

 if(!isDragging)return

 const dy = startY-e.clientY

 const swipe = window.innerHeight*.12

 const delta = dy/swipe

 render(startProgress+delta)

 const now=performance.now()

 const dt=Math.max(8,now-lastMoveTime)

 const v=(lastMoveY-e.clientY)/dt

 velocity=velocity*.6+v*.4

 lastMoveTime=now
 lastMoveY=e.clientY

})

window.addEventListener("pointerup",()=>{

 if(!isDragging)return

 const projected = progress + velocity*.25

 const target = projected>.5 ? 1 : 0

 animateTo(target)

 isDragging=false

})

window.addEventListener("wheel",e=>{

 if(hero.style.pointerEvents==="none")return

 e.preventDefault()

 render(progress+e.deltaY*.003)

})

render(0)

</script>

</body>
</html>

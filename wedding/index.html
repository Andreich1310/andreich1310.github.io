<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Приглашение</title>
<meta property="og:title" content="Мы женимся! 🎉">
<meta property="og:description" content="Приглашаем тебя на свадьбу! Подробности на странице.">
<meta property="og:image" content="https://andreich1310.github.io/preview.jpg">
<meta property="og:url" content="https://andreich1310.github.io/">
<meta property="og:type" content="website">

<style>
:root{
  --gap-start:.5;
  --gap-end:50;
}

/* font-face omitted — keep your fonts folder */
@font-face{
  font-family: "SegoeScript";
  src: url("fonts/segoesc.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
}

html,body{
  height:100%;
  margin:0;
  overflow:hidden;
  font-family: "SegoeScript", system-ui, sans-serif;
  background:#FAF6C9;
}

/* HERO / DOORS */
.hero{
  position:fixed;
  inset:0;
  display:flex;
  perspective:1000px;
  z-index:100;
  transition:opacity .35s cubic-bezier(.22,.61,.36,1);
  touch-action:none;
}

.hero.dragging .door,
.hero.dragging .panel,
.hero.dragging .door img,
.hero.dragging .door-shadow,
.hero.dragging .hint{
  transition:none !important;
}

.door{ width:50%; height:100%; position:relative; transform-style:preserve-3d; will-change:transform; overflow:visible; }
.left{ transform-origin:right center; } .right{ transform-origin:left center; }

.panel{ position:absolute; inset:0; transform-style:preserve-3d; will-change:transform; transition:transform .35s cubic-bezier(.22,.61,.36,1); }
.left .panel{ transform-origin:right bottom; } .right .panel{ transform-origin:left bottom; }

.panel::before{ content:""; position:absolute; inset:0; border:1px solid rgba(0,0,0,.08); pointer-events:none; z-index:70; }
.panel img{ width:100%; height:100%; object-fit:cover; display:block; position:relative; z-index:60; will-change:transform; transition:transform .35s cubic-bezier(.22,.61,.36,1); }
.left .panel img{ object-position:left center; } .right .panel img{ object-position:right center; }

/* тень под створкой */
.door-shadow{ position:absolute; top:0; bottom:0; width:10vw; filter:blur(18px); opacity:.9; pointer-events:none; transform-style:preserve-3d; transition: opacity .22s linear, transform .22s linear; transform: translateZ(-80px); z-index:1; }
.door-shadow.left{ right:6vw; background:linear-gradient(to right,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }
.door-shadow.right{ left:6vw; background:linear-gradient(to left,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }

.inner-edge{ position:absolute; top:0; bottom:0; width:16px; z-index:90; pointer-events:none; mix-blend-mode:multiply; }
.left .inner-edge{ right:0; background:linear-gradient(to left, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }
.right .inner-edge{ left:0; background:linear-gradient(to right, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }

.hint{ position:absolute; left:50%; bottom:12vh; transform:translateX(-50%); z-index:120; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; transition:opacity .18s; }
.hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; } @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.label{ background:rgba(255,255,255,.96); padding:6px 12px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px; }

/* cinematic gap light */
.gap-light{ position:absolute; left:50%; top:0; bottom:0; width:6px; transform:translateX(-50%); pointer-events:none; z-index:20; background: linear-gradient(180deg, rgba(255,245,220,0.95), rgba(255,230,160,0.6)); filter: blur(18px); opacity:0; transition: opacity .26s linear, width .26s linear; }

/* SLIDER: JS-controlled */
.slider{
  position:relative;
  height:100vh;
  height:100dvh;
  overflow:hidden;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
}

.slides{
  position:relative;
  height:100%;
  will-change:transform;
  transform: translate3d(0,0,0); /* initial */
}

.slide{
  height:100vh;
  height:100dvh;
  width:100%;
  position:relative;
  display:flex;
  align-items:flex-start;
  justify-content:center;

  /* performance hints */
  contain: layout paint; /* isolate rendering */
  -webkit-tap-highlight-color: transparent;
  pointer-events: none; /* only active slide receives pointer events */
}
.slide.active{ pointer-events: auto; }

.slide img{ width:100%; height:100%; object-fit:cover; display:block; }
.slide svg { width: 100%; height: 100%; display: block; }

/* inline container for svg file */
.svg-slide {
  width: 100%;
  height: 100%;
  display: block;
  box-sizing: border-box;
}

/* ensure svg scales but preserves coordinates when inline */
.svg-slide svg { width:100%; 
                height:100%; 
                display:block; 
               }
                /*preserveAspectRatio: xMidYMid meet; }*/

/* mobile adjustments */
@media (max-width:520px){
  .door-shadow{ width:14vw; filter:blur(12px); }
  .inner-edge{ width:12px; }
  .door-shadow.left{ right:-10vw; }
  .door-shadow.right{ left:-10vw; }
  .gap-light{ width:10px; }
}

/* --- slide hint --- */
.slide-hint{
  position:absolute;
  left:50%;
  bottom:10vh;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  z-index:200;
  pointer-events:none;
  opacity:0;
  transition:opacity .35s;
}
.slide-hint svg{ width:28px; height:28px; animation:slideHintMove 1.4s infinite ease-in-out; }
@keyframes slideHintMove{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-10px); } }
.slide-hint-text{ background:rgba(255,255,255,.9); padding:6px 12px; border-radius:999px; font-size:13px; box-shadow:0 6px 18px rgba(0,0,0,.08); }

/* --- end message --- */
.end-message{
  position:absolute;
  left:50%;
  top:66vh;
  width:80%;
  transform:translateX(-50%) scale(1);
  font-size:7vw;
  color:#7c170f;
  text-align:center;
  pointer-events:none;
  z-index:300;
  transition:transform .25s cubic-bezier(.22,.61,.36,1);
}

.guest-message{
  position:absolute;
  left:50%;
  bottom:65vh;
  width:70%;
  transform:translateX(-50%) scale(1);
  font-size:8vw;
  color:#e52629;
  font-family:"Georgia";
  text-align:center;
}

/* small helpers */
.hidden{ display:none !important; }
</style>
</head>

<body>

<div class="hero" id="hero" aria-hidden="false">
  <div class="gap-light" id="gapLight" aria-hidden="true"></div>

  <div class="door left" id="leftDoor">
    <div class="panel">
      <div class="door-shadow left"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="door right" id="rightDoor">
    <div class="panel">
      <div class="door-shadow right"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Открывай скорее!</div>
  </div>
</div>

<div class="slider" id="slider" aria-hidden="true">
  <div class="slides" id="slides">

    <section class="slide">
        <div class="svg-slide" data-src="slides/v0.47%20+%20текст_1.svg"></div>
    </section>

    <section class="slide">
        <div class="svg-slide" data-src="slides/2.svg"></div>
        <div class="guest-message" id="guestMessage">Дорогие и любимые Гости!</div>
    </section>
    
    <section class="slide">
        <div class="svg-slide" data-src="slides/3.svg"></div>
    </section>
    
    <section class="slide">
        <div class="svg-slide" data-src="slides/4.svg"></div>
    </section>

    <section class="slide">
        <div class="svg-slide" data-src="slides/5.svg"></div>
    </section>
    
    <section class="slide">
        <div class="svg-slide" data-src="slides/6.svg"></div>
    </section>
    
    <section class="slide">
        <div class="svg-slide" data-src="slides/7.svg"></div>
        <div class="end-message" id="endMessage">Будем рады видеть вас рядом с нами!</div>
    </section>
    
  </div>

  <!-- подсказка свайпа -->
  <div class="slide-hint" id="slideHint" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="slide-hint-text">Листай</div>
  </div>

</div>

<script>
/* =========================
   CONFIG
   ========================= */
const CONFIG = {
  // initial slides to eagerly inline (indexes relative to document.querySelectorAll('.svg-slide'))
  eagerLoadIndexes: [0,1], // load cover and guest slide first
  // when user navigates, prefetch neighbors (count)
  prefetchRadius: 1,
  // conservative limits
  hairspaceMaxAdd: 12
};

/* =========================
   UTIL
   ========================= */
function $(sel, root=document){ return root.querySelector(sel); }
function $all(sel, root=document){ return Array.from(root.querySelectorAll(sel)); }

function runIdle(fn){
  if('requestIdleCallback' in window){
    requestIdleCallback(fn, {timeout: 1000});
  } else {
    setTimeout(fn, 200);
  }
}

/* =========================
   SVG loading (optimized)
   - load only a few needed slides eagerly
   - prefetch neighbors on navigation/idle
   ========================= */
async function fetchAndInsertSVG(container){
  if(!container || container.dataset.__loaded) return;
  const url = container.dataset.src;
  if(!url) return;
  try{
    const res = await fetch(decodeURI(url));
    if(!res.ok) throw new Error('fetch failed ' + res.status);
    const txt = await res.text();
    container.innerHTML = txt;
    container.dataset.__loaded = '1';
  }catch(err){
    console.warn('SVG load failed', url, err);
  }
}

async function loadInitialSVGs(){
  const containers = $all('.svg-slide');
  const promises = [];
  containers.forEach((c, idx)=>{
    if(CONFIG.eagerLoadIndexes.includes(idx)){
      promises.push(fetchAndInsertSVG(c));
    }
  });
  // load eager ones in parallel, but wait for them to finish before running replaceGuestText
  await Promise.all(promises);
  // schedule background prefetch for the rest
  runIdle(()=> {
    containers.forEach((c, idx)=>{
      if(!CONFIG.eagerLoadIndexes.includes(idx)){
        // staged lazy load later
        // do nothing now
      }
    });
  });
}

/* helper: load slide by index and its neighbors (used by slider navigation) */
function ensureSlideLoaded(index){
  const containers = $all('.svg-slide');
  if(index < 0 || index >= containers.length) return;
  fetchAndInsertSVG(containers[index]);
  for(let r=1;r<=CONFIG.prefetchRadius;r++){
    if(index - r >= 0) runIdle(()=> fetchAndInsertSVG(containers[index - r]));
    if(index + r < containers.length) runIdle(()=> fetchAndInsertSVG(containers[index + r]));
  }
}

/* =========================
   HERO (doors) rendering + drag
   (kept concise, based on your original)
   ========================= */
(function heroModule(){
  const hero = document.getElementById('hero');
  const gapLight = document.getElementById('gapLight');
  const leftDoor = document.getElementById('leftDoor');
  const rightDoor = document.getElementById('rightDoor');
  const leftPanel = leftDoor && leftDoor.querySelector('.panel');
  const rightPanel = rightDoor && rightDoor.querySelector('.panel');
  const leftImg = leftDoor && leftDoor.querySelector('img');
  const rightImg = rightDoor && rightDoor.querySelector('img');

  if(!hero) return;

  const initialGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-start')) || 0.5;
  const maxGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-end')) || 50;
  const rot = 38;
  const IMAGE_Z_MULT = 20;
  const DISABLE_HERO_AT = 0.98;
  const FADE_START = 0.93;
  const FADE_END = 0.98;

  let progress = 0;
  let rafId = 0, pending = 0;
  let didVibrate = false;

  function clamp01(v){ return Math.max(0, Math.min(1, v)); }
  function render(p){
    progress = clamp01(p);
    const shift = initialGap + progress * (maxGap - initialGap);
    const depth = progress * 80;
    const tilt = -progress * 6;
    const scaleY = 1 + progress * 0.12;

    if(leftDoor) leftDoor.style.transform = `translateX(${-shift}vw) rotateY(${-progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;
    if(rightDoor) rightDoor.style.transform = `translateX(${shift}vw) rotateY(${progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;
    if(leftPanel) leftPanel.style.transform = `scaleY(${scaleY})`;
    if(rightPanel) rightPanel.style.transform = `scaleY(${scaleY})`;

    const imgZ = -progress * IMAGE_Z_MULT;
    if(leftImg) leftImg.style.transform = `translateZ(${imgZ}px)`;
    if(rightImg) rightImg.style.transform = `translateZ(${imgZ}px)`;

    if(leftDoor){
      const leftShadow = leftDoor.querySelector('.door-shadow');
      if(leftShadow) leftShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));
    }
    if(rightDoor){
      const rightShadow = rightDoor.querySelector('.door-shadow');
      if(rightShadow) rightShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));
    }

    const hint = document.getElementById('hint');
    if(hint) hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

    if(gapLight){
      const lightStart = 0.12, lightEnd = 0.9;
      if(progress <= lightStart){
        gapLight.style.opacity = '0'; gapLight.style.width = '6px';
      } else {
        const lt = Math.min(1, (progress - lightStart) / (lightEnd - lightStart));
        gapLight.style.opacity = String(lt * 0.95);
        gapLight.style.width = `${6 + lt * 18}px`;
      }
    }

    let fade = 1;
    if(progress >= FADE_START){
      const t = Math.min(1, (progress - FADE_START) / (FADE_END - FADE_START));
      fade = 1 - t;
    }
    hero.style.opacity = String(Math.max(0, fade));
    const heroVisible = progress < DISABLE_HERO_AT;
    hero.style.pointerEvents = heroVisible ? 'auto' : 'none';
    hero.setAttribute('aria-hidden', heroVisible ? 'false' : 'true');

    if(progress >= DISABLE_HERO_AT && !didVibrate){
      didVibrate = true;
      try{ navigator.vibrate && navigator.vibrate(8); }catch(e){}
      const slideHint = document.getElementById('slideHint');
      if(slideHint) slideHint.style.opacity = '1';
    }
    if(progress < DISABLE_HERO_AT && didVibrate) didVibrate = false;
  }

  function schedule(p){
    pending = clamp01(p);
    if(rafId) return;
    rafId = requestAnimationFrame(()=>{ rafId = 0; render(pending); });
  }

  function animateTo(target, duration=420){
    const from = progress;
    const start = performance.now();
    const c1 = 1.70158, c3 = c1 + 1;
    function step(now){
      const tRaw = Math.min(1, (now - start) / duration);
      const eased = 1 + c3 * Math.pow(tRaw - 1, 3) + c1 * Math.pow(tRaw - 1, 2);
      render(from + (target - from) * eased);
      if(tRaw < 1) requestAnimationFrame(step); else render(target);
    }
    requestAnimationFrame(step);
  }

  // pointer handlers
  (function wire(){
    let dragging = false;
    let startY = 0, startProgress = 0;
    let lastTime = 0, lastY = 0, velocity = 0;
    hero.addEventListener('pointerdown', e=>{
      if(hero.style.pointerEvents === 'none') return;
      hero.setPointerCapture && hero.setPointerCapture(e.pointerId);
      dragging = true;
      startY = e.clientY;
      startProgress = progress;
      lastTime = performance.now(); lastY = e.clientY; velocity = 0;
      hero.classList.add('dragging');
      e.preventDefault && e.preventDefault();
    }, {passive:false});
    window.addEventListener('pointermove', e=>{
      if(!dragging) return;
      const now = performance.now();
      const dy = startY - e.clientY;
      const swipeDistance = window.innerHeight * 0.12;
      const deltaProgress = dy / swipeDistance;
      schedule(startProgress + deltaProgress);
      const dt = Math.max(8, now - lastTime);
      const v = (lastY - e.clientY) / dt;
      velocity = velocity * 0.6 + v * 0.4;
      lastTime = now; lastY = e.clientY;
      e.preventDefault && e.preventDefault();
    }, {passive:false});
    window.addEventListener('pointerup', e=>{
      if(!dragging) return;
      dragging = false;
      hero.classList.remove('dragging');
      hero.releasePointerCapture && hero.releasePointerCapture(e.pointerId);
      const projectionMs = 180;
      const projected = clamp01(progress + velocity * projectionMs / (window.innerHeight * 0.12));
      const target = (projected > 0.5) ? 1 : 0;
      const dist = Math.abs(target - progress);
      const dur = Math.min(700, Math.max(180, 280 + dist * 480));
      animateTo(target, dur);
      e.preventDefault && e.preventDefault();
    }, {passive:false});
  })();

})();

/* =========================
   SLIDER (rAF + inertia + snap)
   ========================= */
 (function(){
  const slidesWrap = document.getElementById('slides');
  if(!slidesWrap) return;
  const slideEls = Array.from(slidesWrap.querySelectorAll('.slide'));
  const slideCount = slideEls.length;

  // CONFIG (tune for behavior)
  const SLIDE_ANIM_MS = 420;
  const SWIPE_THRESHOLD_PX = 60;
  const FRICTION = 0.0025;
  const MAX_MOMENTUM = 3000;

  let currentIndex = 0;
  let locked = false;

  // state
  let dragging = false, pointerId = null;
  let startY = 0, startTranslate = 0, translate = 0, pending = null, rafId = 0;
  let lastY = 0, lastTime = 0, velocity = 0;

  // VH cache
  let VH = window.innerHeight;
  function updateVH(){ VH = window.innerHeight; }

  // UI elements we will touch
  const slideHint = document.getElementById('slideHint');
  const endMessage = document.getElementById('endMessage');

  // slideHint hide state
  let slideHintHidden = false;
  function hideSlideHint(){
    if(!slideHint || slideHintHidden) return;
    slideHint.style.opacity = '0';
    slideHint.setAttribute('aria-hidden', 'true');
    slideHintHidden = true;
  }

  function apply(y, withTransition=false){
    if(withTransition) slidesWrap.style.transition = `transform ${SLIDE_ANIM_MS}ms cubic-bezier(.22,.61,.36,1)`;
    else slidesWrap.style.transition = 'none';
    slidesWrap.style.transform = `translate3d(0, ${y}px, 0)`;
    // update active slide class and pointer-events
    const idx = Math.round(-y / VH);
    slideEls.forEach((s,i)=>{
      if(i === idx){ s.classList.add('active'); } else { s.classList.remove('active'); }
    });
  }

  function scheduleApply(y, withTransition=false){
    pending = {y, withTransition};
    if(rafId) return;
    rafId = requestAnimationFrame(()=>{ rafId = 0; if(!pending) return; translate = pending.y; apply(pending.y, pending.withTransition); pending = null; });
  }

  function clamp(i){ return Math.max(0, Math.min(slideCount - 1, i)); }

  function snapTo(i, animate=true){
    i = clamp(i);
    // hide hint on any navigation
    hideSlideHint();
    currentIndex = i;
    const to = -i * VH;
    locked = true;
    scheduleApply(to, animate);
    if(animate) setTimeout(()=> locked = false, SLIDE_ANIM_MS + 20); else locked = false;
    // ensure neighbors are loaded
    ensureSlideLoaded(i);
    // reset endMessage transform when we land
    if(endMessage) endMessage.style.transform = "translateX(-50%) scale(1)";
  }

  function momentumAndSnap(initialVel){
    const proj = Math.max(-MAX_MOMENTUM, Math.min(MAX_MOMENTUM, initialVel / FRICTION));
    const projected = translate + proj;
    const target = Math.round(-projected / VH);
    snapTo(target, true);
  }

  function isHeroOpen(){
    const hero = document.getElementById('hero');
    return hero && hero.style && hero.style.pointerEvents !== 'none';
  }

  // pointer handlers
  function onDown(e){
    if(isHeroOpen()) return;
    if(locked) return;
    if(e.isPrimary === false) return;
    // hide hint on first touch
    hideSlideHint();

    dragging = true;
    pointerId = e.pointerId;
    startY = e.clientY;
    startTranslate = translate;
    lastY = e.clientY;
    lastTime = performance.now();
    velocity = 0;
    slidesWrap.style.willChange = 'transform';
    try{ slidesWrap.setPointerCapture && slidesWrap.setPointerCapture(pointerId); }catch(e){}
    slidesWrap.style.transition = 'none';
    e.preventDefault && e.preventDefault();
  }
  function onMove(e){
    if(!dragging || e.pointerId !== pointerId) return;
    const now = performance.now();
    const dy = e.clientY - startY;
    const newT = startTranslate + dy;
    const dt = Math.max(1, now - lastTime);
    const instV = (e.clientY - lastY) / dt;
    velocity = velocity * 0.7 + instV * 0.3;
    lastY = e.clientY; lastTime = now;
    scheduleApply(newT, false);

    // overscroll effect on last slide:
    if(endMessage){
      const lastIndex = slideCount - 1;
      // calculate overscroll relative to last slide baseline (-lastIndex * VH)
      const baseline = -lastIndex * VH;
      // if we're beyond baseline (more negative), overscroll positive
      const overscroll = Math.max(0, -(newT - baseline));
      // scale factor: 1 .. 1.3 for overscroll up to ~300px
      const scale = 1 + Math.min(overscroll / 300, 0.3);
      if(currentIndex === lastIndex && overscroll > 0){
        endMessage.style.transform = `translateX(-50%) scale(${scale})`;
      } else {
        endMessage.style.transform = "translateX(-50%) scale(1)";
      }
    }

    e.preventDefault && e.preventDefault();
  }
  function onUp(e){
    if(!dragging || e.pointerId !== pointerId) return;
    dragging = false;
    try{ slidesWrap.releasePointerCapture && slidesWrap.releasePointerCapture(pointerId); }catch(e){}
    const finalV = velocity;
    const delta = translate - startTranslate;
    if(Math.abs(delta) > SWIPE_THRESHOLD_PX){
      const dir = delta < 0 ? 1 : -1;
      snapTo(currentIndex + dir, true);
    } else {
      momentumAndSnap(finalV);
    }
    velocity = 0;
    slidesWrap.style.willChange = '';
    // reset endMessage scale
    if(endMessage) endMessage.style.transform = "translateX(-50%) scale(1)";
    e.preventDefault && e.preventDefault();
  }
  function onCancel(e){
    if(!dragging || e.pointerId !== pointerId) return;
    dragging = false;
    try{ slidesWrap.releasePointerCapture && slidesWrap.releasePointerCapture(pointerId); }catch(e){}
    snapTo(currentIndex, true);
    slidesWrap.style.willChange = '';
    if(endMessage) endMessage.style.transform = "translateX(-50%) scale(1)";
  }

  // wheel
  let wheelLock = false;
  function onWheel(e){
    if(isHeroOpen()) return;
    if(locked) return;
    if(wheelLock) return;
    // hide hint on scroll
    hideSlideHint();
    wheelLock = true;
    const dir = e.deltaY > 0 ? 1 : -1;
    snapTo(currentIndex + dir, true);
    setTimeout(()=> wheelLock = false, SLIDE_ANIM_MS + 10);
    e.preventDefault && e.preventDefault();
  }

  // keyboard
  function onKey(e){
    if(isHeroOpen()) return;
    if(locked) return;
    // hide hint on keyboard nav
    if(e.key === 'ArrowDown' || e.key === 'PageDown'){ hideSlideHint(); e.preventDefault(); snapTo(currentIndex + 1, true); }
    if(e.key === 'ArrowUp'   || e.key === 'PageUp'){ hideSlideHint(); e.preventDefault(); snapTo(currentIndex - 1, true); }
  }

  // init
  function init(){
    translate = -currentIndex * VH;
    apply(translate, false);

    slidesWrap.addEventListener('pointerdown', onDown, {passive:false});
    window.addEventListener('pointermove', onMove, {passive:false});
    window.addEventListener('pointerup', onUp, {passive:false});
    window.addEventListener('pointercancel', onCancel, {passive:false});
    slidesWrap.addEventListener('wheel', onWheel, {passive:false});
    window.addEventListener('keydown', onKey, {passive:false});

    let rto = 0;
    window.addEventListener('resize', ()=>{ clearTimeout(rto); rto = setTimeout(()=>{ updateVH(); translate = -currentIndex * VH; apply(translate, false); }, 80); });

    slidesWrap.style.willChange = 'transform';
    slidesWrap.style.backfaceVisibility = 'hidden';
    updateVH();
    // ensure initial slide loaded
    ensureSlideLoaded(0);
  }

  // expose API
  window.sliderGoTo = function(i){ snapTo(i, true); };

  init();

})();

/* =========================
   replaceGuestText (single function)
   - user writes "Дорогой X" or "Дорогая X" or "Дорогие ..."
   - if startsWith "Дорогой"/"Дорогая" -> treat singular -> perform pronoun replacements
   - replacements only inside target svg (data-src ending with 2.svg)
   - only change existing <tspan> and <text> without tspans
   - preserve case and adjust width by adding hair spaces if needed
   ========================= */
function replaceGuestText(){
  const params = new URLSearchParams(window.location.search);
  let guestParam = params.get('guest');
  const guestMessage = document.getElementById('guestMessage');
  if(!guestMessage) return;

  if(!guestParam){
    guestMessage.textContent = guestMessage.textContent || "Дорогие гости!";
    return;
  }

  const guestDecoded = decodeURIComponent(guestParam.trim());
  const endsWithPunct = /[!\?\.]\s*$/.test(guestDecoded);
  guestMessage.textContent = guestDecoded + (endsWithPunct ? '' : '!');

  const g = guestDecoded.toLowerCase().trim();
  const isSingular = g.startsWith('дорогой') || g.startsWith('дорогая');

  if(!isSingular){
    console.info('replaceGuestText: plural — skipping pronoun replacements');
    return;
  }

  const DICT = {
    "вы": "ты",
    "вас": "тебя",
    "были": "был"
  };

  const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const preserveCase = (match, replacement) => {
    if(!match) return replacement;
    if(match === match.toUpperCase()) return replacement.toUpperCase();
    if(match[0] === match[0].toUpperCase()) return replacement[0].toUpperCase() + replacement.slice(1);
    return replacement;
  };

  const allSlides = $all('.svg-slide');
  let container = allSlides.find(el => {
    const ds = el.getAttribute('data-src') || '';
    return ds === 'slides/2.svg' || ds.endsWith('/2.svg') || ds.endsWith('2.svg');
  });
  if(!container && allSlides.length >= 2) container = allSlides[1];
  if(!container){ console.warn('replaceGuestText: target svg-slide not found'); return; }

  // ensure target loaded before attempting replacements
  if(!container.dataset.__loaded){
    // load it synchronously then run replacement
    fetchAndInsertSVG(container).then(()=> replaceGuestText());
    return;
  }

  const svg = container.querySelector('svg');
  if(!svg){ console.warn('replaceGuestText: inline svg not found'); return; }

  const TOL = 0.6;
  let totalReplacements = 0, totalAdjustments = 0;

  function makeRe(from){
    return new RegExp('(^|[^\\p{L}])(' + escapeRegExp(from) + ')(?=[^\\p{L}]|$)', 'giu');
  }

  // 1) process tspans
  const tspans = Array.from(svg.querySelectorAll('tspan'));
  tspans.forEach(node=>{
    const orig = node.textContent;
    let text = orig;
    Object.keys(DICT).forEach(from=>{
      const to = DICT[from];
      const re = makeRe(from);
      text = text.replace(re, (m,p1,p2)=>{
        totalReplacements++;
        return (p1||'') + preserveCase(p2, to);
      });
    });
    if(text !== orig){
      // measure and adjust with hair spaces if shorter
      let origLen=null, newLen=null;
      try{ if(typeof node.getComputedTextLength === 'function') origLen = node.getComputedTextLength(); }catch(e){}
      node.textContent = text;
      try{ if(typeof node.getComputedTextLength === 'function') newLen = node.getComputedTextLength(); }catch(e){}
      let iter=0;
      while(origLen !== null && newLen !== null && newLen + TOL < origLen && iter < CONFIG.hairspaceMaxAdd){
        node.textContent = node.textContent + '\u200A';
        iter++; totalAdjustments++;
        try{ newLen = node.getComputedTextLength(); }catch(e){ newLen = null; break; }
      }
    }
  });

  // 2) process <text> without tspans
  const textEls = Array.from(svg.querySelectorAll('text')).filter(t => t.querySelectorAll('tspan').length === 0);
  textEls.forEach(node=>{
    const orig = node.textContent;
    let text = orig;
    Object.keys(DICT).forEach(from=>{
      const to = DICT[from];
      const re = makeRe(from);
      text = text.replace(re, (m,p1,p2)=>{
        totalReplacements++;
        return (p1||'') + preserveCase(p2, to);
      });
    });
    if(text !== orig){
      let origLen=null, newLen=null;
      try{ if(typeof node.getComputedTextLength === 'function') origLen = node.getComputedTextLength(); }catch(e){}
      node.textContent = text;
      try{ if(typeof node.getComputedTextLength === 'function') newLen = node.getComputedTextLength(); }catch(e){}
      let iter=0;
      while(origLen !== null && newLen !== null && newLen + TOL < origLen && iter < CONFIG.hairspaceMaxAdd){
        node.textContent = node.textContent + '\u200A';
        iter++; totalAdjustments++;
        try{ newLen = node.getComputedTextLength(); }catch(e){ newLen = null; break; }
      }
    }
  });

  console.info('replaceGuestText: replacements=', totalReplacements, 'hairspace=', totalAdjustments);
}

/* =========================
   INITIALIZATION
   - load initial svg set, then run replaceGuestText
   ========================= */
loadInitialSVGs().then(()=>{
  try{ replaceGuestText(); }catch(e){ console.error(e); }
  // ensure guest slide loaded for slider
  runIdle(()=> {
    const idx = 1; // guest slide index assumed 1
    ensureSlideLoaded(idx);
  });
});

/* expose for debugging */
window._wedding = {
  replaceGuestText,
  ensureSlideLoaded,
  fetchAndInsertSVG
};
</script>

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Приглашение — двери зависят от свайпа</title>
<style>
  :root{
    --max-gap-vw: 50vw; /* на сколько уезжают створки при прогрессе 1 */
  }
  html,body{height:100%;margin:0;background:#fff;}
  /* HERO — поверх всего, ловит жесты */
  .hero{
    position:fixed;
    inset:0;
    z-index:50;
    overflow:hidden;
    pointer-events:auto;
    touch-action:none; /* полностью управляем жестами в JS */
    background:transparent;
    display:flex;
  }

  .door{
    position:relative;
    width:50%;
    height:100%;
    overflow:hidden;
    display:block;
  }

  .door img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    -webkit-user-drag:none;
    user-select:none;
    pointer-events:none;
  }

  /* левый и правый контейнер — transform управляется JS (translateX) */
  .left  { justify-content:flex-end; }
  .right { justify-content:flex-start; }

  /* Тень по центру — чтобы выглядело как "дверь" */
  .spine {
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:4px;
    transform: translateX(-50%);
    pointer-events:none;
    background: linear-gradient(90deg, rgba(0,0,0,0.05), rgba(0,0,0,0.0));
    z-index:60;
    opacity:1;
  }

  /* SLIDER под дверями */
  .slider{
    position:relative;
    z-index:1;
    height:100dvh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
  }

  .slide{
    height:100dvh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* когда hero полностью скрыт, добавим класс */
  .hero.hidden { display:none; }

  /* optional: небольшая тень/blur при частичном открытии (визуально) */
  .left .overlay,
  .right .overlay {
    position:absolute;
    inset:0;
    pointer-events:none;
    transition: opacity .18s linear;
    background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0));
  }
</style>
</head>
<body>

<!-- HERO — поверх -->
<div class="hero" id="hero" aria-hidden="false">

  <div class="door left" id="leftDoor">
    <img src="Обложка web.svg" alt="Обложка">
    <div class="overlay"></div>
  </div>

  <div class="door right" id="rightDoor">
    <img src="Обложка web.svg" alt="Обложка справа">
    <div class="overlay"></div>
  </div>

  <div class="spine" id="spine"></div>
</div>

<!-- SLIDER (контент под дверями) -->
<div class="slider" id="slider" aria-hidden="false">
  <!-- второй слайд (он под дверями) -->
  <section class="slide" aria-label="Центр">
    <img src="center.svg" alt="Центр">
  </section>

  <section class="slide" aria-label="Левая">
    <img src="Левая web.svg" alt="Левая">
  </section>

  <section class="slide" aria-label="Правая">
    <object data="Правая web.svg" type="image/svg+xml" style="width:100%;height:100%;display:block;"></object>
  </section>
</div>

<script>
/*
  Логика:
  - progress: 0..1 — насколько створки открыты
  - управление жестом:
      pointerdown -> pointermove -> pointerup (для mouse+touch+pen)
      wheel -> изменяет progress (desktop)
  - пока progress < 1 — slider заблокирован (pointer-events:none, overflow hidden)
  - когда progress >= 1 (двери открыты) — скрываем hero и разблокируем slider
  - при движении вниз (negative delta) — прогресс уменьшается, и если опустился до 0 — двери полностью закрыты
*/

(function(){
  const hero = document.getElementById('hero');
  const leftDoor = document.getElementById('leftDoor');
  const rightDoor = document.getElementById('rightDoor');
  const spine = document.getElementById('spine');
  const slider = document.getElementById('slider');

  // Параметры
  const MAX_GAP_VW = 50; // соответствует CSS var --max-gap-vw
  const MAX_DRAG_PX = Math.max(window.innerHeight * 0.6, 240); //  сколько пикселей свайпа = прогресс 1
  const WHEEL_SENSITIVITY = 0.0025; // как быстро колесо меняет прогресс (настраивай)
  const OPEN_THRESHOLD = 0.98; // при >= этого значения считаем открытым
  const CLOSE_THRESHOLD = 0.02; // при <= этого значения считаем закрытым

  let progress = 0; // 0..1
  let pointerActive = false;
  let startY = 0;
  let accumWheel = 0;
  let opened = false; // окончательно открыли и скрыли hero
  let lastPointerId = null;

  // блокируем скролл/взаимодействие со slider пока не открыто
  function blockSlider(){
    slider.style.pointerEvents = 'none';
    slider.style.overflowY = 'hidden';
  }
  function unblockSlider(){
    slider.style.pointerEvents = 'auto';
    slider.style.overflowY = 'auto';
  }

  // инициално блокируем
  blockSlider();

  // обновляем визуалку по текущему progress
  function renderProgress() {
    // left moves left (negative), right moves right (positive)
    const pxShift = (progress * MAX_GAP_VW); // in vw units
    // set transforms as vw values
    leftDoor.style.transform = `translateX(${-pxShift} )`; // pxShift already includes 'vw' unit below
    rightDoor.style.transform = `translateX(${pxShift} )`;

    // But we need vw units; append 'vw'
    leftDoor.style.transform = `translateX(${-pxShift}vw)`;
    rightDoor.style.transform = `translateX(${pxShift}vw)`;

    // subtle shadow / spine opacity
    spine.style.opacity = String(1 - progress);

    // optional: overlays fade
    const overlays = document.querySelectorAll('.overlay');
    overlays.forEach(o => o.style.opacity = String(Math.max(0, 0.3 * (1 - progress))));
  }

  // utility clamp
  function clamp(v, a=0, b=1){ return Math.max(a, Math.min(b, v)); }

  // set progress and react on thresholds
  function setProgress(v, opts = {}) {
    progress = clamp(v, 0, 1);
    renderProgress();

    if (!opened && progress >= OPEN_THRESHOLD) {
      // consider fully opened: hide hero and enable slider
      opened = true;
      // небольшая задержка, чтобы завершилось "визуальное финальное" состояние
      setTimeout(()=> {
        hero.classList.add('hidden'); // display:none
        unblockSlider();
      }, 60); // малое время — визуально уже открыто
    } else if (!opened && progress > 0) {
      // still in partial open: ensure hero visible and slider blocked
      hero.classList.remove('hidden');
      blockSlider();
    } else if (!opened && progress <= CLOSE_THRESHOLD) {
      // полностью закрыто — ничего делать (hero виден, slider заблокирован)
      hero.classList.remove('hidden');
      blockSlider();
    }
  }

  // Pointer events for touch/mouse
  function onPointerDown(e){
    // если уже полностью открыто и скрыто — не нужно ловить
    if (opened) return;
    // только главный указатель
    pointerActive = true;
    lastPointerId = e.pointerId;
    startY = e.clientY;
    // захват события, чтобы pointermove приходил даже если мышь вне области
    (e.target).setPointerCapture && (e.target).setPointerCapture(e.pointerId);
  }

  function onPointerMove(e){
    if (!pointerActive || e.pointerId !== lastPointerId) return;
    const dy = startY - e.clientY; // вверх -> positive
    // progress relative to MAX_DRAG_PX
    const p = clamp(dy / MAX_DRAG_PX, 0, 1);
    setProgress(p);
  }

  function onPointerUp(e){
    if (!pointerActive || e.pointerId !== lastPointerId) return;
    pointerActive = false;
    lastPointerId = null;
    // если пользователь отпустил и прогресс < 1, можно решить: вернуть назад (закрыть)
    // или при небольшом прогрессе откатить к 0, при достаточном — довести до 1.
    if (!opened) {
      if (progress > 0.5) {
        // доводим до 1 (анимация плавная via CSS transition if you want)
        // чтобы сделать плавный "финал", используем небольшую JS-анимацию
        animateProgressTo(1, 180, () => {/* will be hidden by setProgress */});
      } else {
        animateProgressTo(0, 180);
      }
    }
  }

  // Wheel handling for desktop (накручиваем/откручиваем прогресс)
  function onWheel(e){
    // если уже открыто — не мешаем; let default scroll work
    if (opened) return;
    e.preventDefault();
    // deltaY > 0 means scroll down (user wants move content up), so open doors
    const d = e.deltaY;
    const deltaProgress = d * WHEEL_SENSITIVITY;
    setProgress(progress + deltaProgress);
    // если перешли порог, окончательно открываем
    if (progress >= OPEN_THRESHOLD) {
      setProgress(1);
    }
  }

  // Анимировать прогресс до целевого значения (простая линейная анимация)
  function animateProgressTo(target, duration = 200, cb){
    const start = performance.now();
    const from = progress;
    const diff = target - from;
    function step(t){
      const dt = t - start;
      const ratio = clamp(dt / duration, 0, 1);
      // ease-out
      const eased = 1 - Math.pow(1 - ratio, 3);
      setProgress(from + diff * eased);
      if (ratio < 1) requestAnimationFrame(step);
      else {
        if (cb) cb();
      }
    }
    requestAnimationFrame(step);
  }

  // Подключаем обработчики
  // pointer events на hero (чтобы поймать mouse и touch одинаково)
  hero.addEventListener('pointerdown', onPointerDown, {passive:false});
  window.addEventListener('pointermove', onPointerMove, {passive:false});
  window.addEventListener('pointerup', onPointerUp, {passive:false});
  window.addEventListener('pointercancel', onPointerUp, {passive:false});

  // wheel (desktop)
  window.addEventListener('wheel', onWheel, {passive:false});

  // Кроки: на ресайзе обновляем MAX_DRAG_PX
  window.addEventListener('resize', () => {
    // recompute sensible max drag
    // (we keep same variable name but can't reassign const; recompute locally if needed)
    // For simplicity, we'll not change MAX_DRAG_PX here; browser resize is rare during gesture.
  });

  // Инициалное рендерирование
  setProgress(0);

  // Дополнительно: если хочешь после открытия автоматический скролл к следующему слайду — добавь:
  // animateProgressTo(1, 180, () => { hero.classList.add('hidden'); unblockSlider(); slider.scrollTo({ top: window.innerHeight, behavior: 'smooth' }); });

})();
</script>
</body>
</html>

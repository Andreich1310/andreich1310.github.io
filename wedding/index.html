<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Doors</title>

<style>

html,body{
height:100%;
margin:0;
overflow:hidden;
font-family:system-ui;
}

/* HERO */

.hero{
position:fixed;
inset:0;
display:flex;
z-index:100;
perspective:1200px;
pointer-events:auto;
transition:opacity .28s ease;
touch-action:none;
}

/* DOORS */

.door{
width:50%;
height:100%;
position:relative;
overflow:visible;
transform-style:preserve-3d;
will-change:transform;
transition:transform .35s cubic-bezier(.22,.61,.36,1);
backface-visibility:hidden;
z-index:30;
}

.left{transform-origin:right center;}
.right{transform-origin:left center;}

.door img{
width:100%;
height:100%;
object-fit:cover;
display:block;
position:relative;
z-index:40;
will-change:transform;
}

/* SHADOW */

.door-shadow{
position:absolute;
top:0;
bottom:0;
width:12vw;
pointer-events:none;
filter:blur(20px);
opacity:.9;
z-index:10;
transform-style:preserve-3d;
transform:translateZ(-80px);
transition:opacity .25s linear;
}

.door-shadow.left{
right:-7vw;
background:linear-gradient(to right,rgba(0,0,0,.65),rgba(0,0,0,.25),transparent);
}

.door-shadow.right{
left:-7vw;
background:linear-gradient(to left,rgba(0,0,0,.65),rgba(0,0,0,.25),transparent);
}

/* INNER EDGE */

.inner-edge{
position:absolute;
top:0;
bottom:0;
width:16px;
z-index:50;
pointer-events:none;
mix-blend-mode:multiply;
}

.left .inner-edge{
right:0;
background:linear-gradient(to left,rgba(0,0,0,.46),rgba(0,0,0,.05) 40%,transparent);
}

.right .inner-edge{
left:0;
background:linear-gradient(to right,rgba(0,0,0,.46),rgba(0,0,0,.05) 40%,transparent);
}

/* HINT */

.hint{
position:absolute;
left:50%;
bottom:12vh;
transform:translateX(-50%);
z-index:60;
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
pointer-events:none;
transition:opacity .2s;
}

.hint svg{
width:28px;
height:28px;
animation:bob 1.2s infinite ease-in-out;
}

@keyframes bob{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

.label{
background:white;
padding:6px 12px;
border-radius:999px;
box-shadow:0 6px 18px rgba(0,0,0,.08);
font-size:13px;
}

/* SLIDER */

.slider{
position:relative;
z-index:1;
height:100vh;
overflow-y:auto;
scroll-snap-type:y mandatory;
}

.slide{
height:100vh;
scroll-snap-align:start;
display:flex;
align-items:center;
justify-content:center;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>


<body>

<div class="hero" id="hero">

<div class="door left" id="leftDoor">

<div class="door-shadow left"></div>

<img src="Обложка web.svg">

<div class="inner-edge"></div>

</div>

<div class="door right" id="rightDoor">

<div class="door-shadow right"></div>

<img src="Обложка web.svg">

<div class="inner-edge"></div>

</div>

<div class="hint" id="hint">

<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<polyline points="6 15 12 9 18 15"></polyline>
</svg>

<div class="label">Потяни вверх</div>

</div>

</div>


<div class="slider" id="slider">

<section class="slide"><img src="center.svg"></section>

<section class="slide"><img src="Левая web.svg"></section>

<section class="slide"><img src="Правая web.svg"></section>

</div>


<script>

const hero=document.getElementById("hero")
const leftDoor=document.getElementById("leftDoor")
const rightDoor=document.getElementById("rightDoor")
const hint=document.getElementById("hint")

let progress=0

const rot=38

function render(p){

progress=Math.max(0,Math.min(1,p))

const shift=2+progress*(50-2)

const depth=progress*80
const scale=1-progress*0.08
const skew=progress*4

leftDoor.style.transform=`
translateX(${-shift}vw)
rotateY(${-progress*rot}deg)
translateZ(${-depth}px)
scaleX(${scale})
skewY(${skew}deg)
`

rightDoor.style.transform=`
translateX(${shift}vw)
rotateY(${progress*rot}deg)
translateZ(${-depth}px)
scaleX(${scale})
skewY(${-skew}deg)
`

leftDoor.querySelector(".door-shadow").style.opacity=0.9-progress
rightDoor.querySelector(".door-shadow").style.opacity=0.9-progress

hint.style.opacity=Math.max(0,1-progress*1.6)

if(progress>0.98){

hero.style.pointerEvents="none"
hero.style.opacity="0"

}else{

hero.style.pointerEvents="auto"
hero.style.opacity="1"

}

}

/* SWIPE */

let startY=0
let startProgress=0
let dragging=false

window.addEventListener("pointerdown",e=>{
dragging=true
startY=e.clientY
startProgress=progress
})

window.addEventListener("pointermove",e=>{

if(!dragging)return

const dy=startY-e.clientY
const dist=window.innerHeight*0.12

render(startProgress+dy/dist)

})

window.addEventListener("pointerup",()=>{

dragging=false

if(progress>0.5){

animate(1)

}else{

animate(0)

}

})

function animate(target){

const start=progress
const duration=350
const startTime=performance.now()

function frame(now){

let t=(now-startTime)/duration

if(t>1)t=1

const ease=1-Math.pow(1-t,3)

render(start+(target-start)*ease)

if(t<1)requestAnimationFrame(frame)

}

requestAnimationFrame(frame)

}

render(0)

</script>

</body>
</html>

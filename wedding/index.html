<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Приглашение</title>
  <meta property="og:title" content="Мы женимся! 🎉">
  <meta property="og:description" content="Приглашаем тебя на свадьбу! Подробности на странице.">
  <meta property="og:image" content="https://andreich1310.github.io/preview.jpg">
  <meta property="og:url" content="https://andreich1310.github.io/">
  <meta property="og:type" content="website">

  <!--Для прозрачной поисковой строки  -->
  <meta name="theme-color" content="#f5e9da">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  .slider {
  display: flex;
  flex-direction: column;     /* ⬅️ ВАЖНО */
  width: 100vw;
  height: 100vh;
  overflow-y: auto;            /* ⬅️ вместо overflow-x */
  scroll-snap-type: y mandatory; /* ⬅️ вместо x */
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

  .slide {
  width: 100vw;
  height: 100vh;
  flex: 0 0 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
}

  .slide img,
  .slide svg,
  .slide object{
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  /* скрыть скроллбар */
  .slider::-webkit-scrollbar {
    display: none;
  }
  .slider {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
</style>
  
</head>
<body>
  <div class="slider">
  <!--<h1>🚀 Все работает!</h1>-->
  <!--<p>Мы женимся</p>-->
     <div class="slide">
   <img src="center.svg" alt="Макет">
     </div>

     <div class="slide">
   <img src="Левая.svg" alt="Макет">
     </div>
  
     <div class="slide">
        <object data="Правая web.svg"  type="image/svg+xml"></object>
     </div>
       
  </div>
</body>
</html>

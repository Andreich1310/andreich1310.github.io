<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Приглашение — двери, блокируем слайдер</title>
<style>
  html,body{height:100%;margin:0;}
  /* hero (двери) поверх всего */
  .hero{
    position:fixed;
    inset:0;
    z-index:20;
    overflow:hidden;
    pointer-events:auto; /* важно: ловим touch/wheel на hero */
    touch-action: none; /* отключаем браузерные жесты на hero */
    background:transparent;
  }
  .door{
    position:absolute;
    inset:0;
    transition: transform .8s cubic-bezier(.22,.9,.2,1);
  }
  .left{ clip-path: inset(0 50% 0 0); }
  .right{ clip-path: inset(0 0 0 50%); }
  .door img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;}

  .hero.open .left{ transform: translateX(-50vw); }
  .hero.open .right{ transform: translateX(50vw); }

  /* slider: под дверями */
  .slider{
    position:relative;
    z-index:1;
    height:100dvh;
    overflow-y:auto; /* будет временно отключён через JS */
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
  }

  .slide{
    height:100dvh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .slide img{ max-width:100%; max-height:100%; object-fit:contain; display:block; }

  /* на время блокировки визуально можно затемнить фон (опционально) */
  .hero.backdrop::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.05));
    pointer-events:none;
  }
</style>
</head>
<body>

<!-- двери (hero) -->
<div class="hero backdrop" id="hero" aria-hidden="false">
  <div class="door left" id="leftDoor"><img src="Обложка web.svg" alt=""></div>
  <div class="door right" id="rightDoor"><img src="Обложка web.svg" alt=""></div>
</div>

<!-- основной контент под дверями -->
<div class="slider" id="slider" aria-hidden="false">
  <!-- второй слайд (он будет под дверями) -->
  <section class="slide" aria-label="Центр">
    <img src="center.svg" alt="Центр">
  </section>

  <section class="slide" aria-label="Левая">
    <img src="Левая web.svg" alt="Левая">
  </section>

  <section class="slide" aria-label="Правая">
    <object data="Правая web.svg" type="image/svg+xml" style="width:100%;height:100%;display:block;"></object>
  </section>
</div>

<script>
(function(){
  const hero = document.getElementById('hero');
  const slider = document.getElementById('slider');
  const ANIM_MS = 800; // соответствует CSS transition .8s
  const SWIPE_THRESHOLD = 40; // px

  let startY = null;
  let opened = false;

  // Заблокировать скролл/взаимодействие со слайдером до открытия
  function blockSlider(){
    slider.style.pointerEvents = 'none';
    slider.style.overflowY = 'hidden';
    // дополнительно: на мобильных браузерах иногда нужно запретить touch-action на document
    document.documentElement.style.touchAction = 'none';
  }
  function unblockSlider(){
    slider.style.pointerEvents = 'auto';
    slider.style.overflowY = 'auto';
    document.documentElement.style.touchAction = '';
  }

  // Сначала блокируем (пока двери закрыты)
  blockSlider();

  // Обработчики — passive:false чтобы можно было preventDefault()
  function onTouchStart(e){
    if (!e.touches || e.touches.length === 0) return;
    startY = e.touches[0].clientY;
  }

  function onTouchMove(e){
    // если двери уже открыты — не мешаем
    if (opened) return;
    if (!startY) {
      // не начат жест — блокируем прокрутку
      e.preventDefault();
      return;
    }
    const currentY = e.touches[0].clientY;
    const dy = currentY - startY;

    // свайп вверх (dy < 0) — открываем двери только при достаточном дельта
    if (dy < -SWIPE_THRESHOLD) {
      e.preventDefault();
      openDoors();
      startY = null;
      return;
    }

    // любое движение до открытия — предотвращаем, чтобы underlying slider не дергался
    e.preventDefault();
  }

  function onTouchEnd(){
    startY = null;
  }

  function onWheel(e){
    // если уже открыто — ничего не делаем
    if (opened) return;
    // если колесо вниз (пользователь прокручивает страницу вверх визуально), откроем
    if (e.deltaY > 30) {
      e.preventDefault();
      openDoors();
    } else {
      // блокируем любое прокручивание пока двери закрыты
      e.preventDefault();
    }
  }

  // открытие дверей
  function openDoors(){
    if (opened) return;
    opened = true;

    // визуально открываем двери
    hero.classList.add('open');

    // В течение анимации preventDefault и не давать скролл — уже сделано (blockSlider)
    // после анимации убираем hero и разблокируем слайдер
    setTimeout(()=>{
      // скрываем hero, чтобы он не ловил дальнейшие события
      hero.style.display = 'none';
      unblockSlider();
    }, ANIM_MS + 20);

    // можно также программно прокрутить к следующему слайду, если нужно:
    // slider.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
  }

  // Подключаем слушатели — passive:false важно
  hero.addEventListener('touchstart', onTouchStart, {passive:false});
  hero.addEventListener('touchmove', onTouchMove, {passive:false});
  hero.addEventListener('touchend', onTouchEnd, {passive:true});

  // wheel: перехватываем на window, иначе desktop колесо может прокрутить контейнер
  window.addEventListener('wheel', onWheel, {passive:false});

  // на случай клика/нажатия — открыть по клику (опционально)
  hero.addEventListener('click', (e) => {
    // предотвратить случайные клики если уже открыто
    if (!opened) openDoors();
  });

  // Защитное: если пользователь резко прокрутит скролл жестом (например мышью) и hero не видно —
  // убедимся, что при начале открытия мы всё равно корректно разблокируем после анимации.
})();
</script>

</body>
</html>

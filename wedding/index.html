<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Исправление створок</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
  :root {
    --initial-gap-vw: 2; /* начальный зазор между створками */
    --max-gap-vw: 50;    /* сдвиг при прогрессе 1 (100%) */
    --anim-duration: 300ms;
  }
  html, body {
    margin: 0; height: 100%; overflow: hidden;
  }

  /* ===== Двери (hero) ===== */
  .hero {
    position: fixed;
    inset: 0; z-index: 50;
    display: flex;
    pointer-events: auto; /* ловим события жестов */
    touch-action: none;   /* отключаем системные жесты браузера */
    background: transparent; /* <-- изменено: было #fff, теперь прозрачный чтобы был виден слайд под ним */
    overflow: hidden;
  }
  .door {
    position: relative;
    width: 50%;
    height: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .door img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Левый дверной проём показывает левую часть изображения */
  .door.left img { object-position: right center; }
  /* Правый дверной проём показывает правую часть изображения */
  .door.right img { object-position: left center; }
  /* Тени у внутренних краёв створок для эффекта стыка */
  .inner-edge {
    position: absolute; top: 0; bottom: 0;
    width: 8px;
    pointer-events: none;
    z-index: 60;
  }
  .left .inner-edge  { right: 0; background: linear-gradient(to left, rgba(0,0,0,0.16), transparent); }
  .right .inner-edge { left: 0;  background: linear-gradient(to right, rgba(0,0,0,0.16), transparent); }

  /* Центр — видимый зазор (spine) */
  .spine {
    position: absolute;
    top: 0; bottom: 0;
    left: calc(50% - 3px);
    width: 60px;
    background: linear-gradient(90deg, rgba(0,0,0,0.14), rgba(255,255,255,0.02), rgba(0,0,0,0.18));
    box-shadow: 0 0 18px rgba(0,0,0,0.06);
    pointer-events: none;
    transition: opacity 0.18s linear;
    z-index: 55;
  }

  /* Подсказка (стрелка и текст) */
  .hint {
    position: absolute;
    left: 50%; bottom: 12vh;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    opacity: 1;
    transition: opacity 0.25s;
    z-index: 70;
    font-family: sans-serif;
    color: #222;
    font-weight: 500;
  }
  .hint svg {
    width: 28px; height: 28px;
    animation: bob 1.2s infinite ease-in-out;
  }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .hint .label {
    margin-top: 8px;
    background: rgba(255,255,255,0.9);
    padding: 6px 10px;
    border-radius: 999px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    font-size: 13px;
  }

  /* ===== Скроллер (slider) ===== */
  .slider {
    position: relative;
    z-index: 1;
    height: 100dvh;
    overflow-y: auto; /* будет заблокирован JS до открытия */
    scroll-snap-type: y mandatory;
    -webkit-overflow-scrolling: touch;
  }
  .slide {
    height: 100dvh;
    scroll-snap-align: start;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  /* Изменено: делаем слайды полноэкранными, чтобы первый слайд точно был виден через зазор */
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Когда двери полностью открыты, скрываем слой */
  .hero.hidden { display: none; }
  </style>
</head>
<body>

<!-- Двери -->
<div class="hero" id="hero" aria-label="Обложка — потяните вверх, чтобы открыть">
  <div class="door left" aria-hidden="true">
    <!-- Одна и та же картинка для обеих створок -->
    <img src="Обложка web.svg" alt="">
    <div class="inner-edge"></div>
  </div>
  <div class="door right" aria-hidden="true">
    <img src="Обложка web.svg" alt="">
    <div class="inner-edge"></div>
  </div>
  <div class="spine"></div>
  <div class="hint" id="hint">
    <!-- Стрелка вверх (SVG-иконка) -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<!-- Основной слайдер под дверями -->
<div class="slider" id="slider">
  <section class="slide" aria-label="Центр">
    <img src="center.svg" alt="">
  </section>
  <section class="slide" aria-label="Левая">
    <img src="Левая web.svg" alt="">
  </section>
  <section class="slide" aria-label="Правая">
    <img src="Правая web.svg" alt="">
  </section>
</div>

<script>
(function(){
  const hero = document.getElementById('hero');
  const slider = document.getElementById('slider');
  const hint = document.getElementById('hint');

  let startY = null, opened = false;
  const THRESHOLD = 40; // пиксели для срабатывания
  const DURATION = 300; // ms (должно соответствовать --anim-duration)

  // Изначально блокируем прокрутку и взаимодействие со слайдером
  function blockSlider() {
    slider.style.pointerEvents = 'none';
    slider.style.overflowY = 'hidden';
  }
  function unblockSlider() {
    slider.style.pointerEvents = 'auto';
    slider.style.overflowY = 'auto';
  }
  blockSlider();

  // Управление прогрессом открытия (0..1)
  let progress = 0;
  function setProgress(p) {
    progress = Math.max(0, Math.min(1, p));
    // Устанавливаем сдвиг обеих створок: 
    // initialGap + progress*(maxGap - initialGap) по сторонам от центра
    const initial = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--initial-gap-vw'));
    const maxGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--max-gap-vw'));
    const shift = initial + progress * (maxGap - initial);
    // Применяем translateX к .door
    document.querySelector('.door.left').style.transform = `translateX(${-shift}vw)`;
    document.querySelector('.door.right').style.transform = `translateX(${shift}vw)`;
    // Меняем прозрачность подсказки и spine
    hero.querySelector('.spine').style.opacity = String(1 - Math.min(1, progress * 1.1));
    hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

    // ОПЦИОНАЛЬНО: если хотите, чтобы сами изображения створок немного исчезали по мере открытия,
    // раскомментируйте строки ниже:
    // const doorLeftImg = document.querySelector('.door.left img');
    // const doorRightImg = document.querySelector('.door.right img');
    // doorLeftImg.style.opacity = String(1 - progress);
    // doorRightImg.style.opacity = String(1 - progress);

    if (progress >= 0.98 && !opened) {
      // Полностью открыто
      opened = true;
      setTimeout(()=>{
        hero.classList.add('hidden');
        unblockSlider();
      }, 80);
    } else if (progress <= 0 && !opened) {
      // Если закрыто (progress=0), можно сбросить hint, но он уже спрятан
    }
  }

  // Анимация завершения открытия/закрытия
  function animateTo(target, duration) {
    const start = performance.now(), from = progress;
    function step(now) {
      const t = (now - start) / duration;
      if (t < 1) {
        // ease-out эффект
        const eased = 1 - Math.pow(1 - t, 3);
        setProgress(from + (target - from) * eased);
        requestAnimationFrame(step);
      } else {
        setProgress(target);
      }
    }
    requestAnimationFrame(step);
  }

  // Жесты: pointer (работает и для мыши и для тача)
  window.addEventListener('pointerdown', e => {
    if (opened) return;
    startY = e.clientY;
    // Убираем hint при первом взаимодействии
    hint.remove();
  }, {passive:false});

  window.addEventListener('pointermove', e => {
    if (opened || startY === null) return;
    const dy = startY - e.clientY;
    const p = Math.max(0, dy / (window.innerHeight * 0.6));
    setProgress(p);
    // Предотвращаем скролл
    if (dy > 0) e.preventDefault();
  }, {passive:false});

  window.addEventListener('pointerup', e => {
    if (opened) return;
    if (progress > 0.45) {
      animateTo(1, 220); // открыть полностью
    } else {
      animateTo(0, 180); // закрыть
    }
    startY = null;
  });

  // Wheel (для desktop)
  window.addEventListener('wheel', e => {
    if (opened) return;
    e.preventDefault();
    const delta = e.deltaY * 0.0025;
    setProgress(progress + delta);
    if (progress >= 0.98) setProgress(1);
  }, {passive:false});

  // Быстрое открытие по клику (опционально)
  hero.addEventListener('click', e => {
    if (!opened) animateTo(1, 220);
  });

  // Инициално – закрыто
  setProgress(0);
})();
</script>
</body>
  </html>

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Doors — fixed gestures</title>
<style>
  :root{ --gap-start:2; --gap-end:50; }
  html,body{height:100%;margin:0;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
  /* overlay with doors */
  .hero{
    position:fixed; inset:0; display:flex; z-index:40;
    perspective:1800px;
    pointer-events:auto; transition:opacity .28s ease;
  }
  .door{
    width:50%; height:100%; position:relative; overflow:hidden;
    transform-style:preserve-3d; will-change:transform;
    transition: transform .42s cubic-bezier(.22,.61,.36,1);
    backface-visibility:hidden;
  }
  .door img{ width:100%; height:100%; object-fit:cover; display:block;
    transition: transform .42s cubic-bezier(.22,.61,.36,1); will-change:transform;
  }
  .left{ transform-origin:right center; } .right{ transform-origin:left center; }
  .left img{ object-position:right center; } .right img{ object-position:left center; }

  /* thin inner edge and soft per-door shadow */
  .inner-edge{ position:absolute; top:0; bottom:0; width:16px; z-index:9; pointer-events:none; mix-blend-mode:multiply; }
  .left .inner-edge{ right:0; background:linear-gradient(to left, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%);}
  .right .inner-edge{ left:0; background:linear-gradient(to right, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%);}

  .door-shadow{ position:absolute; top:0; bottom:0; width:8vw; pointer-events:none; z-index:7; filter:blur(18px); opacity:.9; }
  .door-shadow.left{ right:-2vw; background:linear-gradient(to right, rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }
  .door-shadow.right{ left:-2vw; background:linear-gradient(to left, rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }

  .hint{ position:absolute; left:50%; bottom:12vh; transform:translateX(-50%); z-index:50; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; transition:opacity .18s;}
  .hint svg{ width:28px; height:28px; animation:bob 1.2s infinite ease-in-out; display:block }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .label{ background:rgba(255,255,255,.96); padding:6px 12px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px; }

  /* content slider */
  .slider{ position:relative; z-index:1; height:100vh; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
  .slide{ height:100vh; scroll-snap-align:start; }
  .slide img{ width:100%; height:100%; object-fit:cover; display:block; }

  /* responsive tweak */
  @media (max-width:520px){
    .door-shadow{ width:14vw; filter:blur(12px); }
    .inner-edge{ width:12px; }
  }
</style>
</head>
<body>

<div class="hero" id="hero" aria-hidden="false">
  <div class="door left" id="leftDoor">
    <img src="Обложка web.svg" alt="">
    <div class="door-shadow left"></div>
    <div class="inner-edge"></div>
  </div>

  <div class="door right" id="rightDoor">
    <img src="Обложка web.svg" alt="">
    <div class="door-shadow right"></div>
    <div class="inner-edge"></div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<div class="slider" id="slider" tabindex="0">
  <section class="slide"><img src="center.svg" alt=""></section>
  <section class="slide"><img src="Левая web.svg" alt=""></section>
  <section class="slide"><img src="Правая web.svg" alt=""></section>
</div>

<script>
(function(){
  // elements
  const hero = document.getElementById('hero');
  const leftDoor = document.getElementById('leftDoor');
  const rightDoor = document.getElementById('rightDoor');
  const hint = document.getElementById('hint');
  const slider = document.getElementById('slider');

  // state
  let progress = 0;            // 0..1
  let isDragging = false;     // dragging doors
  let potentialClose = false; // user started on slider and may want to close
  let startY = 0;
  let startProgress = 0;

  const SWIPE_DISTANCE_FACTOR = 0.35; // portion of innerHeight that constitutes one full swipe
  const DISABLE_HERO_AT = 0.98;       // when hero pointer-events are disabled

  // helper clamp
  const clamp = v => Math.max(0, Math.min(1, v));

  // visual update
  function render(p){
    progress = clamp(p);

    const shift = 2 + progress * (50 - 2); // vw
    const rotate = 38; // deg
    const parallaxZ = 40; // px

    leftDoor.style.transform = `translateX(${-shift}vw) rotateY(${-progress*rotate}deg)`;
    rightDoor.style.transform = `translateX(${shift}vw) rotateY(${progress*rotate}deg)`;

    // little image parallax
    const imgScale = 1 + progress * 0.02;
    leftDoor.querySelector('img').style.transform = `translateZ(${ -progress*(parallaxZ/2) }px) scale(${imgScale})`;
    rightDoor.querySelector('img').style.transform = `translateZ(${ -progress*(parallaxZ/2) }px) scale(${imgScale})`;

    // door-shadow opacity tweak (less when more open)
    leftDoor.querySelector('.door-shadow').style.opacity = String(0.9 - progress*0.85);
    rightDoor.querySelector('.door-shadow').style.opacity = String(0.9 - progress*0.85);

    // hint fade
    hint.style.opacity = String(Math.max(0, 1 - progress*1.6));

    // enable/disable hero pointer events so slider can receive gestures when fully open
    if (progress >= DISABLE_HERO_AT){
      hero.style.pointerEvents = 'none';
      hero.style.opacity = '0';
      hero.setAttribute('aria-hidden','true');
    } else {
      hero.style.pointerEvents = 'auto';
      hero.style.opacity = '1';
      hero.setAttribute('aria-hidden','false');
    }
  }

  // animate to target [0|1] with easing
  function animateTo(target, duration = 360){
    const from = progress;
    const start = performance.now();
    function step(now){
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
      render(from + (target - from) * eased);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // pointerdown general handler
  window.addEventListener('pointerdown', (e) => {
    // if user pressed inside hero (overlay active) and hero is interactive -> begin door drag
    if (e.target.closest('.hero') && getComputedStyle(hero).pointerEvents !== 'none') {
      isDragging = true;
      startY = e.clientY;
      startProgress = progress;
      // prevent native scroll during door drag
      e.preventDefault && e.preventDefault();
      return;
    }

    // if user pressed inside slider and doors are fully open, we may allow closing via slider swipe
    if (e.target.closest('#slider') && progress >= DISABLE_HERO_AT) {
      // don't immediately steal the gesture: mark as potential close and watch moves
      potentialClose = true;
      startY = e.clientY;
      startProgress = progress;
      // do NOT preventDefault yet — allow normal scrolling until it's clear user intends to close
      return;
    }
  }, {passive: false});

  // pointermove: two modes — active door drag, or potentialClose from slider
  window.addEventListener('pointermove', (e) => {
    // door drag active — fully control door progress and block scrolling
    if (isDragging) {
      const dy = startY - e.clientY; // positive = move up (open)
      const swipeDistance = window.innerHeight * SWIPE_DISTANCE_FACTOR;
      const delta = dy / swipeDistance;
      render(startProgress + delta);
      // prevent scroll if dragging doors
      e.preventDefault && e.preventDefault();
      return;
    }

    // if user started on slider while doors open — decide whether they mean to close
    if (potentialClose) {
      const dy = startY - e.clientY;
      // if vertical motion is small, do nothing (let slider handle); when it exceeds threshold, and direction is downward (dy<0), start door drag
      const threshold = 8; // px
      if (Math.abs(dy) > threshold) {
        // if user swipes down (dy < 0) we start closing doors
        if (dy < 0) {
          // start door-dragging mode — enable hero to receive pointer events and take over gesture
          isDragging = true;
          potentialClose = false;
          // re-enable hero right away so transforms update as we move
          hero.style.pointerEvents = 'auto';
          hero.style.opacity = '1';
          startProgress = progress; // should be ~1
          startY = e.clientY;
          // we stole the gesture — prevent scroll
          e.preventDefault && e.preventDefault();
        } else {
          // user is scrolling up (dy>0) — likely wants to scroll slider; cancel potentialClose and do nothing
          potentialClose = false;
        }
      }
      return;
    }
  }, {passive:false});

  // pointerup: end drag or potentialClose
  window.addEventListener('pointerup', (e) => {
    if (isDragging) {
      // snap depending on progress
      const target = (progress > 0.5) ? 1 : 0;
      animateTo(target, 360);
    }
    // cancel flags
    isDragging = false;
    potentialClose = false;
    startY = 0;
    startProgress = progress;
  }, {passive:true});

  // wheel — allow wheel/trackpad to open/close while hero intercepts; when hero disabled, let native scroll occur
  let wheelTimeout = null;
  window.addEventListener('wheel', (e) => {
    if (getComputedStyle(hero).pointerEvents === 'none') return; // let slider handle it
    e.preventDefault();
    const speed = 0.0026;
    render(progress + e.deltaY * speed);
    // snap after wheel stops
    if (wheelTimeout) clearTimeout(wheelTimeout);
    wheelTimeout = setTimeout(() => {
      wheelTimeout = null;
      const t = (progress > 0.5) ? 1 : 0;
      animateTo(t, 420);
    }, 110);
  }, {passive:false});

  // keyboard: toggle with Enter/Space/Escape
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') animateTo(0);
    if (e.key === 'Enter' || e.key === ' ') { animateTo(progress > 0.5 ? 0 : 1); }
  });

  // init
  render(0);

  // keep visual consistent on resize
  window.addEventListener('resize', ()=> render(progress));
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Apple style doors</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:sans-serif;
}

/* HERO */

.hero{
position:fixed;
inset:0;
z-index:20;
display:flex;
perspective:1800px;
touch-action:none;
transition:opacity .35s;
}

/* двери */

.door{
width:50%;
height:100%;
overflow:hidden;
position:relative;
transform-style:preserve-3d;
transition:transform .45s cubic-bezier(.22,.61,.36,1);
}

.door img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.left{transform-origin:right center;}
.right{transform-origin:left center;}

.left img{object-position:right center;}
.right img{object-position:left center;}

/* внутренняя кромка */

.inner-edge{
position:absolute;
top:0;
bottom:0;
width:16px;
pointer-events:none;
z-index:3;
}

.left .inner-edge{
right:0;
background:linear-gradient(to left,rgba(0,0,0,.4),transparent);
}

.right .inner-edge{
left:0;
background:linear-gradient(to right,rgba(0,0,0,.4),transparent);
}

/* тень в щели */

.gap-shadow{
position:absolute;
top:0;
bottom:0;
left:50%;
transform:translateX(-50%);
width:4vw;
background:radial-gradient(
ellipse at center,
rgba(0,0,0,.7),
rgba(0,0,0,.3),
transparent 70%
);
filter:blur(18px);
pointer-events:none;
z-index:2;
opacity:.9;
}

/* подсказка */

.hint{
position:absolute;
left:50%;
bottom:12vh;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
pointer-events:none;
z-index:10;
}

.hint svg{
width:28px;
height:28px;
animation:bob 1.2s infinite ease-in-out;
}

@keyframes bob{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

.label{
background:white;
padding:6px 12px;
border-radius:999px;
font-size:13px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* SLIDER */

.slider{
height:100vh;
overflow-y:auto;
scroll-snap-type:y mandatory;
position:relative;
z-index:1;
}

.slide{
height:100vh;
scroll-snap-align:start;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

</style>
</head>

<body>

<div class="hero" id="hero">

<div class="door left">
<img src="Обложка web.svg">
<div class="inner-edge"></div>
</div>

<div class="gap-shadow" id="shadow"></div>

<div class="door right">
<img src="Обложка web.svg">
<div class="inner-edge"></div>
</div>

<div class="hint" id="hint">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<polyline points="6 15 12 9 18 15"></polyline>
</svg>
<div class="label">Потяни вверх</div>
</div>

</div>

<div class="slider">

<section class="slide">
<img src="center.svg">
</section>

<section class="slide">
<img src="Левая web.svg">
</section>

<section class="slide">
<img src="Правая web.svg">
</section>

</div>

<script>

const hero=document.getElementById("hero")
const left=document.querySelector(".left")
const right=document.querySelector(".right")
const shadow=document.getElementById("shadow")
const hint=document.getElementById("hint")

let progress=0
let startY=null

function update(p){

progress=Math.max(0,Math.min(1,p))

const shift=2+progress*48
const rot=38

left.style.transform=
`translateX(${-shift}vw) rotateY(${-progress*rot}deg)`

right.style.transform=
`translateX(${shift}vw) rotateY(${progress*rot}deg)`

shadow.style.width=(4+progress*32)+"vw"
shadow.style.opacity=1-progress*.7

hint.style.opacity=Math.max(0,1-progress*1.5)

/* когда открыто — отключаем hero */

if(progress>.95){

hero.style.pointerEvents="none"
hero.style.opacity="0"

}else{

hero.style.pointerEvents="auto"
hero.style.opacity="1"

}

}

/* gesture */

window.addEventListener("pointerdown",e=>{
if(e.target.closest(".hero")){
startY=e.clientY
}
})

window.addEventListener("pointermove",e=>{

if(startY===null)return

const dy=startY-e.clientY
const delta=dy/(window.innerHeight*.7)

update(progress+delta)

startY=e.clientY

})

window.addEventListener("pointerup",()=>{
startY=null
})

/* wheel */

window.addEventListener("wheel",e=>{

if(hero.style.pointerEvents==="none") return

e.preventDefault()

update(progress+e.deltaY*.002)

},{passive:false})

update(0)

</script>

</body>
  </html>

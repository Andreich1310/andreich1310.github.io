<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Приглашение</title>

<meta property="og:title" content="Мы женимся! 🎉">
<meta property="og:description" content="Приглашаем тебя на свадьбу! Подробности на странице.">
<meta property="og:image" content="https://andreich1310.github.io/preview.jpg">
<meta property="og:url" content="https://andreich1310.github.io/">
<meta property="og:type" content="website">

<style>

:root{
  --gap-start:.5;
  --gap-end:50;
}

@font-face{
  font-family:"SegoeScript";
  src:url("fonts/segoesc.ttf") format("truetype");
}

html,body{
  height:100%;
  margin:0;
  overflow:hidden;
  background:#FAF6C9;
  font-family:"SegoeScript";
}

.hero{
  position:fixed;
  inset:0;
  display:flex;
  perspective:1000px;
  z-index:100;
  transition:opacity .35s cubic-bezier(.22,.61,.36,1);
}

.door{
  width:50%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  will-change:transform;
  backface-visibility:hidden;
}

.left{transform-origin:right center;}
.right{transform-origin:left center;}

.panel{
  position:absolute;
  inset:0;
  will-change:transform;
}

.panel img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transform:translateZ(0);
}

.slider{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.slides{
  position:relative;
  will-change:transform;
}

.slide{
  height:100vh;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  contain:layout paint size;
}

.svg-slide{
  width:100%;
  height:100%;
}

.svg-slide svg{
  width:100%;
  height:100%;
}

.slide-hint{
  position:absolute;
  left:50%;
  bottom:10vh;
  transform:translateX(-50%);
  opacity:0;
  transition:opacity .3s;
}

.slide-hint svg{
  width:28px;
  height:28px;
  animation:slideHintMove 1.4s infinite ease-in-out;
}

@keyframes slideHintMove{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.end-message{
  position:absolute;
  left:50%;
  top:66vh;
  transform:translateX(-50%);
  font-size:7vw;
  color:#7c170f;
  text-align:center;
}

.guest-message{
  position:absolute;
  left:50%;
  bottom:65vh;
  transform:translateX(-50%);
  font-size:8vw;
  color:#e52629;
  font-family:Georgia;
  text-align:center;
}

</style>
</head>

<body>

<div class="hero" id="hero">

<div class="door left" id="leftDoor">
<div class="panel">
<img src="Обложка web.svg">
</div>
</div>

<div class="door right" id="rightDoor">
<div class="panel">
<img src="Обложка web.svg">
</div>
</div>

</div>

<div class="slider" id="slider">

<div class="slides" id="slides">

<section class="slide">
<div class="svg-slide" data-src="slides/v0.47 + текст_1.svg"></div>
</section>

<section class="slide">
<div class="svg-slide" data-src="slides/2.svg"></div>
<div class="guest-message" id="guestMessage">Дорогие гости!</div>
</section>

<section class="slide">
<div class="svg-slide" data-src="slides/3.svg"></div>
</section>

<section class="slide">
<div class="svg-slide" data-src="slides/4.svg"></div>
</section>

<section class="slide">
<div class="svg-slide" data-src="slides/5.svg"></div>
</section>

<section class="slide">
<div class="svg-slide" data-src="slides/6.svg"></div>
</section>

<section class="slide">
<div class="svg-slide" data-src="slides/7.svg"></div>
<div class="end-message" id="endMessage">Будем рады видеть вас рядом с нами!</div>
</section>

</div>

<div class="slide-hint" id="slideHint">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<polyline points="6 15 12 9 18 15"></polyline>
</svg>
</div>

</div>

<script>

const hero=document.getElementById("hero");
const leftDoor=document.getElementById("leftDoor");
const rightDoor=document.getElementById("rightDoor");

const slidesWrap=document.getElementById("slides");
const slides=[...slidesWrap.querySelectorAll(".slide")];
const slideHint=document.getElementById("slideHint");

let progress=0;
let vh=window.innerHeight;

const slideCount=slides.length;

let currentSlide=0;
let locked=false;

function renderHero(p){

progress=Math.max(0,Math.min(1,p));

const shift=.5+progress*49.5;
const rot=38;

leftDoor.style.transform=
`translateX(${-shift}vw) rotateY(${-progress*rot}deg)`;

rightDoor.style.transform=
`translateX(${shift}vw) rotateY(${progress*rot}deg)`;

hero.style.opacity=1-progress;

if(progress>0.98){
hero.style.pointerEvents="none";
slideHint.style.opacity=1;
}

}

function animateHero(target){

const start=progress;
const startTime=performance.now();

function frame(now){

let t=(now-startTime)/400;

if(t>1)t=1;

const eased=1-Math.pow(1-t,3);

renderHero(start+(target-start)*eased);

if(t<1)requestAnimationFrame(frame);

}

requestAnimationFrame(frame);

}

let startY=0;

hero.addEventListener("pointerdown",e=>{
startY=e.clientY;
});

hero.addEventListener("pointerup",e=>{

const dy=startY-e.clientY;

if(dy>100)animateHero(1);
else animateHero(0);

});

function setSlides(y){

slidesWrap.style.transform=`translateY(${y}px)`;

}

function goToSlide(i){

if(locked)return;

locked=true;

currentSlide=Math.max(0,Math.min(slideCount-1,i));

setSlides(-currentSlide*vh);

setTimeout(()=>locked=false,400);

}

let sliderStart=0;

slidesWrap.addEventListener("pointerdown",e=>{
sliderStart=e.clientY;
slideHint.style.opacity=0;
});

slidesWrap.addEventListener("pointerup",e=>{

const dy=sliderStart-e.clientY;

if(Math.abs(dy)<50)return;

if(dy>0)goToSlide(currentSlide+1);
else goToSlide(currentSlide-1);

});

window.addEventListener("wheel",e=>{
if(hero.style.pointerEvents==="none"){
goToSlide(currentSlide+(e.deltaY>0?1:-1));
}
});

async function loadSVGSlides(){

const containers=[...document.querySelectorAll(".svg-slide")];

await Promise.all(containers.map(async el=>{

const url=el.dataset.src;

try{

const res=await fetch(url);
el.innerHTML=await res.text();

}catch{}

}));

replaceGuestText();

}

function replaceGuestText(){

const params=new URLSearchParams(location.search);

const guest=params.get("guest");

if(!guest)return;

const guestMessage=document.getElementById("guestMessage");

if(guestMessage){

guestMessage.textContent=decodeURIComponent(guest);

}

}

loadSVGSlides();

renderHero(0);

</script>

</body>
</html>

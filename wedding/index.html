<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apple-like Doors</title>
<style>
html,body{
  margin:0; height:100%; overflow:hidden;
  font-family:system-ui, -apple-system, "Segoe UI", Roboto, Arial;
}

/* ===== HERO (doors overlay) ===== */
.hero{
  position:fixed; inset:0; display:flex; z-index:40;
  perspective:1800px;
  pointer-events:auto;
  transition:opacity .35s ease;
}

/* Doors */
.door{
  width:50%; height:100%; position:relative; overflow:hidden;
  transform-style:preserve-3d;
  will-change: transform;
  transition: transform .45s cubic-bezier(.22,.61,.36,1);
  backface-visibility:hidden;
}
.door img{
  width:100%; height:100%; object-fit:cover; display:block;
  will-change: transform;
  transform-origin:center;
  transition: transform .45s cubic-bezier(.22,.61,.36,1);
}
.left{ transform-origin:right center; }
.right{ transform-origin:left center; }
.left img{ object-position:right center; }
.right img{ object-position:left center; }

/* Inner edge highlight */
.inner-edge{
  position:absolute; top:0; bottom:0;
  width:18px; pointer-events:none; z-index:8;
  mix-blend-mode:multiply;
}
.left .inner-edge{
  right:0; background: linear-gradient(to left, rgba(0,0,0,.45), rgba(0,0,0,.08) 40%, transparent 100%);
}
.right .inner-edge{
  left:0; background: linear-gradient(to right, rgba(0,0,0,.45), rgba(0,0,0,.08) 40%, transparent 100%);
}

/* Door shadows (soft shadows for each door) */
.door-shadow{
  position:absolute; top:0; bottom:0; width:8vw;
  pointer-events:none; z-index:5;
  filter:blur(22px); opacity:.9;
}
.door-shadow.left{
  right:-2vw;
  background:linear-gradient(to right, rgba(0,0,0,.7), rgba(0,0,0,.3), transparent);
}
.door-shadow.right{
  left:-2vw;
  background:linear-gradient(to left, rgba(0,0,0,.7), rgba(0,0,0,.3), transparent);
}

/* Hint arrow */
.hint{
  position:absolute; left:50%; bottom:12vh; transform:translateX(-50%);
  z-index:50; display:flex; flex-direction:column; align-items:center; gap:8px;
  pointer-events:none; transition:opacity .18s;
}
.hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; }
@keyframes bob{ 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
.label{
  background:rgba(255,255,255,.96);
  padding:6px 12px; border-radius:999px;
  box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px;
}

/* Slider content */
.slider{
  position:relative; z-index:1; height:100vh;
  overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch;
}
.slide{ height:100vh; scroll-snap-align:start; }
.slide img{ width:100%; height:100%; object-fit:cover; display:block; }
</style>
</head>
<body>

<!-- Doors overlay -->
<div class="hero" id="hero" aria-hidden="false">
  <div class="door left" id="leftDoor">
    <img src="Обложка web.svg" alt="">
    <div class="door-shadow left"></div>
    <div class="inner-edge"></div>
  </div>

  <div class="door right" id="rightDoor">
    <img src="Обложка web.svg" alt="">
    <div class="door-shadow right"></div>
    <div class="inner-edge"></div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<!-- Slider content -->
<div class="slider" id="slider" tabindex="0">
  <section class="slide"><img src="center.svg" alt=""></section>
  <section class="slide"><img src="Левая web.svg" alt=""></section>
  <section class="slide"><img src="Правая web.svg" alt=""></section>
</div>

<script>
(function(){
  const hero = document.getElementById("hero");
  const left = document.getElementById("leftDoor");
  const right = document.getElementById("rightDoor");
  const hint = document.getElementById("hint");

  let progress = 0; // 0..1
  let startY = null;
  let startProgress = 0;

  function update(p){
    progress = Math.max(0, Math.min(1, p));
    const shift = 2 + progress*48;
    const rot = 38;

    left.style.transform = `translateX(${-shift}vw) rotateY(${-progress*rot}deg)`;
    right.style.transform = `translateX(${shift}vw) rotateY(${progress*rot}deg)`;

    hint.style.opacity = Math.max(0, 1-progress*1.5);

    if(progress >= 0.97){
      hero.style.pointerEvents = "none";
      hero.style.opacity = "0";
    } else {
      hero.style.pointerEvents = "auto";
      hero.style.opacity = "1";
    }
  }

  function animate(target){
    const start = progress;
    const startTime = performance.now();
    function frame(now){
      const k = Math.min(1,(now-startTime)/350);
      const eased = 1-Math.pow(1-k,3);
      update(start+(target-start)*eased);
      if(k<1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  window.addEventListener("pointerdown", e=>{
    if(!e.target.closest(".hero")) return;
    startY = e.clientY;
    startProgress = progress;
  }, {passive:true});

  window.addEventListener("pointermove", e=>{
    if(startY === null) return;
    const dy = startY - e.clientY;
    const swipeDistance = window.innerHeight * 0.35; // один свайп = полный прогресс
    const delta = dy / swipeDistance;
    update(startProgress + delta);
  }, {passive:true});

  window.addEventListener("pointerup", ()=>{
    if(progress > 0.5){
      animate(1);
    } else {
      animate(0);
    }
    startY = null;
  });

  // wheel support
  window.addEventListener("wheel", e=>{
    if(hero.style.pointerEvents==="none") return;
    e.preventDefault();
    update(progress + e.deltaY*0.003);
  }, {passive:false});

  update(0);
})();
</script>
</body>
</html>

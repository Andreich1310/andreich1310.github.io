<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Doors — final</title>
<style>
:root{
  --gap-start:1;    /* начальный зазор в vw (уменьшил вдвое) */
  --gap-end:50;
}

html,body{
  height:100%; margin:0; overflow:hidden; font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;
}

/* HERO (над слайдером) */
.hero{
  position:fixed; inset:0; display:flex; z-index:100;
  perspective:1000px;
  pointer-events:auto; transition:opacity .28s ease;
  touch-action:none; background:transparent;
}

/* DOOR — отвечает за вращение/смещение/глубину (pivot у шва) */
.door{
  width:50%; height:100%; position:relative; overflow:visible;
  transform-style:preserve-3d; will-change:transform;
  transition: transform .35s cubic-bezier(.22,.61,.36,1);
  backface-visibility:hidden;
  z-index:40;
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
}
.left{ transform-origin: right center; }
.right{ transform-origin: left center; }

/* PANEL — внутри door: содержит img и тень; на него применяем scaleY с origin сверху/снизу */
.panel{
  position:absolute; inset:0; transform-style:preserve-3d; will-change:transform;
  z-index:50; display:block;
  transition: transform .35s cubic-bezier(.22,.61,.36,1);
}
/* В этой версии панель растягивается вверх (origin: bottom) — но ротейтX сделан отрицательно,
   в результате верхний зазор становится больше. */
.left .panel{ transform-origin: right bottom; }
.right .panel{ transform-origin: left bottom; }

/* Контур панели */
.panel::before{
  content:""; position:absolute; inset:0; pointer-events:none; z-index:70;
  border:1px solid rgba(0,0,0,0.08);
  box-shadow: 0 1px 0 rgba(255,255,255,0.02) inset;
}

/* IMG: делаем шире (200%) и сдвигаем, чтобы левая/правая показывали половины.
   Трансформы комбинируем в JS (translateZ + translateX) */
.panel img{
  width:200%; height:100%; object-fit:cover; display:block;
  position:relative; z-index:80; transform-style:preserve-3d; will-change:transform;
}

/* тень внутри панели — следует за панелью, лежит позади изображения */
.door-shadow{
  position:absolute; top:0; bottom:0; width:10vw; pointer-events:none;
  filter:blur(18px); opacity:.9; z-index:40;
  transform-style:preserve-3d; transition: opacity .22s linear, transform .22s linear;
  transform: translateZ(-80px);
}
.door-shadow.left{ right:-6vw; background: linear-gradient(to right, rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }
.door-shadow.right{ left:-6vw;  background: linear-gradient(to left, rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }

/* внутренняя кромка (над всем) */
.inner-edge{ position:absolute; top:0; bottom:0; width:16px; z-index:90; pointer-events:none; mix-blend-mode:multiply; }
.left .inner-edge{ right:0; background:linear-gradient(to left, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }
.right .inner-edge{ left:0;  background:linear-gradient(to right, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }

/* hint */
.hint{ position:absolute; left:50%; bottom:12vh; transform:translateX(-50%); z-index:110; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; transition:opacity .18s;}
.hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; }
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.label{ background:rgba(255,255,255,.96); padding:6px 12px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px; }

/* SLIDER под hero */
.slider{ position:relative; z-index:1; height:100vh; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; pointer-events:auto; }
.slide{ height:100vh; scroll-snap-align:start; display:flex; align-items:center; justify-content:center; }
.slide img{ width:100%; height:100%; object-fit:cover; display:block; }

/* small screens */
@media (max-width:520px){
  .door-shadow{ width:18vw; filter:blur(12px); }
  .inner-edge{ width:12px; }
  .door-shadow.left{ right:-10vw; }
  .door-shadow.right{ left:-10vw; }
}
</style>
</head>
<body>

<div class="hero" id="hero" aria-hidden="false">
  <div class="door left" id="leftDoor" aria-hidden="true">
    <div class="panel">
      <div class="door-shadow left" aria-hidden="true"></div>
      <!-- img шире (200%) — будем сдвигать в JS: left = 0, right = -50% -->
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="door right" id="rightDoor" aria-hidden="true">
    <div class="panel">
      <div class="door-shadow right" aria-hidden="true"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<div class="slider" id="slider" tabindex="0">
  <section class="slide"><img src="center.svg" alt=""></section>
  <section class="slide"><img src="Левая web.svg" alt=""></section>
  <section class="slide"><img src="Правая web.svg" alt=""></section>
</div>

<script>
(function(){
const hero = document.getElementById('hero');
const leftDoor = document.getElementById('leftDoor');
const rightDoor = document.getElementById('rightDoor');
const leftPanel = leftDoor.querySelector('.panel');
const rightPanel = rightDoor.querySelector('.panel');
const leftImg = leftPanel.querySelector('img');
const rightImg = rightPanel.querySelector('img');
const leftShadow = leftPanel.querySelector('.door-shadow');
const rightShadow = rightPanel.querySelector('.door-shadow');
const hint = document.getElementById('hint');
const slider = document.getElementById('slider');

const SWIPE_DISTANCE_FACTOR = 0.12;
const DISABLE_HERO_AT = 0.999; // позволяем прогресс доходить до 1, блокируем действия потом

let progress = 0;
let isDragging = false;
let potentialClose = false;
let startY = 0;
let startProgress = 0;
let lastMoveTime = 0;
let lastMoveY = 0;
let velocity = 0;
const clamp = v => Math.max(0, Math.min(1, v));

/* блокировка слайдера пока двери закрыты */
function blockSlider(){
  slider.style.pointerEvents = 'none';
  slider.style.overflowY = 'hidden';
}
function unblockSlider(){
  slider.style.pointerEvents = 'auto';
  slider.style.overflowY = 'auto';
}

/* Изначально блокируем слайдер */
blockSlider();

/* Удобные параметры */
const initialGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-start')) || 1;
const maxGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-end')) || 50;
const rot = 38; // поворот по Y (петли)

function render(p){
  progress = clamp(p);

  const shift = initialGap + progress * (maxGap - initialGap); // vw

  // door depth / rotateX (отрицательное — чтобы верхний зазор был больше)
  const doorDepth = progress * 80;       // px внутренняя грань уходит в глубь
  const rotateX = -progress * 6;         // отрицательное: верх открывается сильнее
  const scaleY = 1 + progress * 0.12;    // усиленное растяжение по Y (вдвое)

  // внешняя трансформация дверей (pivot и поворот)
  leftDoor.style.transform = `
    translateX(${-shift}vw)
    rotateY(${-progress * rot}deg)
    translateZ(${-doorDepth}px)
    rotateX(${rotateX}deg)
  `;
  rightDoor.style.transform = `
    translateX(${shift}vw)
    rotateY(${progress * rot}deg)
    translateZ(${-doorDepth}px)
    rotateX(${rotateX}deg)
  `;

  // scaleY панели — origin bottom (panel настроен в CSS)
  leftPanel.style.transform = `scaleY(${scaleY})`;
  rightPanel.style.transform = `scaleY(${scaleY})`;

  // img: смещаем влево/вправо, и двигаем по Z чуть вперед, чтобы изображение над тенью
  const imgZ = -progress * 18; // px
  leftImg.style.transform = `translateZ(${imgZ}px) translateX(0%)`;    // левая половина
  rightImg.style.transform = `translateZ(${imgZ}px) translateX(-50%)`; // правая половина

  // корректируем opacity тени
  leftShadow.style.opacity = String(Math.max(0, 0.9 - progress * 1.05));
  rightShadow.style.opacity = String(Math.max(0, 0.9 - progress * 1.05));

  // подсказка
  hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

  // при полном открытии — плавно скрываем hero и включаем слайдер
  if(progress >= DISABLE_HERO_AT){
    // Плавно скрываем
    hero.style.pointerEvents = 'none';
    hero.style.opacity = '0';
    // через щель времени прячем окончательно и даём управление слайдеру
    setTimeout(()=>{
      hero.style.display = 'none';
      unblockSlider();
      hero.setAttribute('aria-hidden','true');
    }, 280); // совпадает с transition:opacity
  } else {
    // Если закрываем обратно — показываем hero и блокируем слайдер
    if(getComputedStyle(hero).display === 'none'){
      hero.style.display = '';
    }
    hero.style.opacity = '1';
    hero.style.pointerEvents = 'auto';
    hero.setAttribute('aria-hidden','false');
    blockSlider();
  }
}

/* Анимация к цели с финальной корректировкой */
function animateTo(target, duration = 360){
  const from = progress;
  const start = performance.now();
  function step(now){
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    render(from + (target - from) * eased);
    if(t < 1) requestAnimationFrame(step);
    else {
      // гарантируем точное состояние
      render(target);
      // если целевой = 1, уже обработается в render (скрытие)
      if(target < 1){
        // если закрыли — удостоверимся, что hero видим и слайдер заблокирован
        hero.style.display = '';
        hero.style.opacity = '1';
        hero.style.pointerEvents = 'auto';
        hero.setAttribute('aria-hidden','false');
        blockSlider();
      }
    }
  }
  requestAnimationFrame(step);
}

/* Pointer handling */
window.addEventListener('pointerdown', function(e){
  // если клик по hero (пока не скрыт)
  if(e.target.closest('.hero') && getComputedStyle(hero).pointerEvents !== 'none'){
    isDragging = true; potentialClose = false;
    startY = e.clientY; startProgress = progress;
    lastMoveTime = performance.now(); lastMoveY = e.clientY; velocity = 0;
    e.preventDefault && e.preventDefault();
    return;
  }
  // если открыт и пользователь вверху slider — даём шанс закрыть
  if(e.target.closest('#slider') && progress >= DISABLE_HERO_AT){
    if(slider.scrollTop <= 2){
      potentialClose = true;
      startY = e.clientY; startProgress = progress;
      lastMoveTime = performance.now(); lastMoveY = e.clientY; velocity = 0;
    } else {
      potentialClose = false;
    }
    return;
  }
}, { passive:false });

window.addEventListener('pointermove', function(e){
  const now = performance.now();
  if(isDragging){
    const dy = startY - e.clientY;
    const swipeDistance = window.innerHeight * SWIPE_DISTANCE_FACTOR;
    const deltaProgress = dy / swipeDistance;
    render(startProgress + deltaProgress);
    const dt = Math.max(8, now - lastMoveTime);
    const v = (lastMoveY - e.clientY) / dt;
    velocity = velocity * 0.6 + v * 0.4;
    lastMoveTime = now; lastMoveY = e.clientY;
    e.preventDefault && e.preventDefault();
    return;
  }
  if(potentialClose){
    const dy = startY - e.clientY;
    const threshold = 8;
    if(Math.abs(dy) > threshold){
      if(dy < 0){
        isDragging = true; potentialClose = false;
        hero.style.pointerEvents = 'auto';
        startProgress = progress; startY = e.clientY;
        lastMoveTime = now; lastMoveY = e.clientY; velocity = 0;
        e.preventDefault && e.preventDefault();
      } else {
        potentialClose = false;
      }
    }
    return;
  }
}, { passive:false });

window.addEventListener('pointerup', function(){
  if(isDragging){
    const projectionMs = 180;
    const projected = clamp(progress + velocity * projectionMs / (window.innerHeight * SWIPE_DISTANCE_FACTOR));
    const target = (projected > 0.5) ? 1 : 0;
    const dist = Math.abs(target - progress);
    const dur = Math.min(700, Math.max(180, 280 + dist * 480));
    animateTo(target, dur);
  }
  isDragging = false; potentialClose = false; startY = 0; startProgress = progress; velocity = 0;
}, { passive:true });

/* Wheel */
let wheelTimer = null;
window.addEventListener('wheel', function(e){
  if(getComputedStyle(hero).pointerEvents === 'none') return;
  e.preventDefault();
  const sensitivity = 0.003;
  render(progress + e.deltaY * sensitivity);
  if(wheelTimer) clearTimeout(wheelTimer);
  wheelTimer = setTimeout(()=>{ wheelTimer = null; const target = (progress > 0.5) ? 1 : 0; animateTo(target, 360); }, 110);
}, { passive:false });

/* Keyboard shortcuts */
window.addEventListener('keydown', function(e){
  if(e.key === 'Escape') animateTo(0);
  if(e.key === 'Enter' || e.key === ' ') animateTo(progress > 0.5 ? 0 : 1);
});

/* init */
render(0);
window.addEventListener('resize', ()=>render(progress));
})();
</script>
</body>
  </html>

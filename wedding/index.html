<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Двери — тень в зазоре, усиленный 3D</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
  :root{
    --initial-gap-vw: 2;   /* смещение одной створки при закрытом состоянии (vw) */
    --max-gap-vw: 50;      /* смещение одной створки при полном открытии (vw) */
    --p: 0;                /* прогресс 0..1 (заполняется из JS) */
    --gap-w: 0px;          /* ширина зазора в px (заполняется из JS) */
  }

  html,body{height:100%;margin:0;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}

  /* HERO (обложка) */
  .hero{
    position:fixed; inset:0; z-index:50;
    display:flex; pointer-events:auto; touch-action:none;
    overflow:visible; perspective:1200px;
    -webkit-font-smoothing:antialiased;
  }
  .door{
    position:relative; width:50%; height:100%;
    overflow:hidden; display:flex; align-items:center; justify-content:center;
    transform-style:preserve-3d; transition:transform .28s ease-out;
    will-change:transform;
    -webkit-user-select:none; user-select:none;
    backface-visibility:hidden;
  }

  /* ось вращения — внутри шва */
  .door.left{ transform-origin: right center; }
  .door.right{ transform-origin: left center; }

  .door img{
    position:relative; z-index:1;
    width:100%; height:100%; object-fit:cover; display:block;
    -webkit-user-drag:none; user-drag:none;
  }

  /* лёгкий градиент/затенение на лицевой стороне створки —
     интенсивность = calc(var(--p) * X) */
  .door::before{
    content:""; position:absolute; inset:0; z-index:5; pointer-events:none;
    transition:background .08s linear, opacity .08s linear;
  }
  .door.left::before{
    background: linear-gradient(to left,
      rgba(0,0,0, calc(var(--p) * 0.48) ),
      rgba(0,0,0, calc(var(--p) * 0.08) ) 38%,
      transparent 60%);
  }
  .door.right::before{
    background: linear-gradient(to right,
      rgba(0,0,0, calc(var(--p) * 0.48) ),
      rgba(0,0,0, calc(var(--p) * 0.08) ) 38%,
      transparent 60%);
  }

  /* внутренняя кромка (тонкая подсветка/тень вдоль шва) — поверх лицевой тени */
  .inner-edge{
    position:absolute; top:0; bottom:0; width:12px; pointer-events:none;
    z-index:8; mix-blend-mode:multiply; transition:opacity .12s;
  }
  .left .inner-edge{
    right:0;
    background: linear-gradient(to left, rgba(0,0,0,0.32), rgba(0,0,0,0.06) 40%, transparent 100%);
    box-shadow: inset -2px 0 10px rgba(0,0,0,0.09);
  }
  .right .inner-edge{
    left:0;
    background: linear-gradient(to right, rgba(0,0,0,0.32), rgba(0,0,0,0.06) 40%, transparent 100%);
    box-shadow: inset 2px 0 10px rgba(0,0,0,0.09);
  }

  /* GAP: тень находится непосредственно в зазоре между створками */
  .gap{
    position:absolute;
    top:0; bottom:0;
    left:50%; transform:translateX(-50%);
    width:var(--gap-w);
    pointer-events:none;
    z-index:4; /* ниже inner-edge (8), выше фон(1) */
    transition:width .06s linear, opacity .06s linear, transform .06s linear;
    display:block;
    overflow:visible;
  }
  .gap::before{
    content:""; position:absolute; inset:0;
    /* плотная тёмная сердцевина, мягкие края */
    background: linear-gradient(90deg,
      rgba(0,0,0,0.95) 0%,
      rgba(10,10,10,0.95) 10%,
      rgba(20,20,20,0.86) 45%,
      rgba(20,20,20,0.86) 55%,
      rgba(10,10,10,0.95) 90%,
      rgba(0,0,0,0.95) 100%);
    box-shadow: 0 0 60px 18px rgba(0,0,0,0.45) inset;
    border-radius:2px;
    opacity: calc( 1 - var(--p) ); /* тень чуть уходит при полном открытии */
    transform: translateZ(1px);
  }

  /* подсказка (стрелка+текст) */
  .hint{
    position:absolute; left:50%; bottom:12vh; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px;
    pointer-events:none; z-index:70; transition:opacity .2s, transform .2s;
  }
  .hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .hint .label{ background:rgba(255,255,255,0.95); padding:6px 10px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,0.08); font-size:13px; }

  .hint.used{ opacity:0; transform:translateX(-50%) translateY(8px); pointer-events:none; }

  /* скроллер (контент) */
  .slider{ position:relative; z-index:1; height:100dvh; overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; }
  .slide{ height:100dvh; scroll-snap-align:start; display:flex; justify-content:center; align-items:center; }
  .slide img{ width:100%; height:100%; object-fit:cover; display:block; }

  .hero.hidden{ display:none; }
  </style>
</head>
<body>

<div class="hero" id="hero" aria-label="Обложка — потяните вверх, чтобы открыть">
  <div class="door left" aria-hidden="true">
    <img src="Обложка web.svg" alt="">
    <div class="inner-edge"></div>
  </div>

  <!-- gap — тень находится именно в щели -->
  <div class="gap" id="gap" aria-hidden="true"></div>

  <div class="door right" aria-hidden="true">
    <img src="Обложка web.svg" alt="">
    <div class="inner-edge"></div>
  </div>

  <div class="hint" id="hint" role="status" aria-live="polite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<div class="slider" id="slider">
  <section class="slide" aria-label="Центр"><img src="center.svg" alt=""></section>
  <section class="slide" aria-label="Левая"><img src="Левая web.svg" alt=""></section>
  <section class="slide" aria-label="Правая"><img src="Правая web.svg" alt=""></section>
</div>

<script>
(function(){
  const hero = document.getElementById('hero');
  const slider = document.getElementById('slider');
  const hint = document.getElementById('hint');
  const leftDoor = document.querySelector('.door.left');
  const rightDoor = document.querySelector('.door.right');
  const gapEl = document.getElementById('gap');

  // настройки — легко менять
  const initialGapVW = 2;   // соответствует --initial-gap-vw
  const maxGapVW = 50;      // соответствует --max-gap-vw
  const rotateMax = 28;     // угол поворота (градусы) — увеличьте для более драматичного эффекта
  const zDepth = 60;        // translateZ в пикселях (объём)

  let startY = null;
  let opened = false;
  let progress = 0;

  function blockSlider(){ slider.style.pointerEvents='none'; slider.style.overflowY='hidden'; }
  function unblockSlider(){ slider.style.pointerEvents='auto'; slider.style.overflowY='auto'; }
  blockSlider();

  function setProgress(p){
    progress = Math.max(0, Math.min(1, p));

    // shift — смещение одной створки в vw (минимум initialGapVW, максимум maxGapVW)
    const shift = initialGapVW + progress * (maxGapVW - initialGapVW);

    // обновляем CSS-переменные для использования в стилях
    document.documentElement.style.setProperty('--p', String(progress));

    // рассчитываем ширину зазора в пикселях: две створки по shift vw -> total gap = 2 * shift vw
    const gapVW = shift * 2; // vw
    const gapPx = (gapVW / 100) * window.innerWidth;
    document.documentElement.style.setProperty('--gap-w', `${gapPx}px`);

    // применяем трансформы к створкам: translateX и rotateY + translateZ (чтобы добавить объём)
    leftDoor.style.transform = `
      translateX(${-shift}vw)
      translateZ(${ progress * zDepth }px)
      rotateY(${-progress * rotateMax}deg)
    `;
    rightDoor.style.transform = `
      translateX(${shift}vw)
      translateZ(${ progress * zDepth }px)
      rotateY(${progress * rotateMax}deg)
    `;

    // чуть регулируем opacity подсказки
    hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

    // inner-edge остаётся сверху; можно регулировать её прозрачность в зависимости от открытия
    const innerOpacity = 0.38 + (0.62 * (1 - progress));
    document.querySelectorAll('.inner-edge').forEach(el => el.style.opacity = innerOpacity.toString());

    // gap — тень в щели: при закрытом состоянии видно сильнее, при открытом уходит
    gapEl.style.opacity = String(Math.max(0, 1 - progress * 1.2));
    gapEl.style.transform = `translateY(${ -progress * 10 }px)`; // лёгкий параллакс

    if (progress >= 0.98 && !opened){
      opened = true;
      setTimeout(()=>{
        hero.classList.add('hidden');
        unblockSlider();
      }, 80);
    }
  }

  function animateTo(target, duration){
    const start = performance.now(), from = progress;
    function step(now){
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setProgress(from + (target - from) * eased);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  // pointer handlers
  window.addEventListener('pointerdown', e => {
    if (opened) return;
    startY = e.clientY;
    hint.classList.add('used');
  }, {passive:false});

  window.addEventListener('pointermove', e => {
    if (opened || startY === null) return;
    const dy = startY - e.clientY;
    const p = Math.max(0, dy / (window.innerHeight * 0.6));
    setProgress(p);
    if (dy > 0) e.preventDefault();
  }, {passive:false});

  window.addEventListener('pointerup', e => {
    if (opened) return;
    if (progress > 0.45) animateTo(1, 260);
    else animateTo(0, 200);
    startY = null;
  });

  // wheel
  window.addEventListener('wheel', e => {
    if (opened) return;
    e.preventDefault();
    const delta = e.deltaY * 0.0025;
    setProgress(progress + delta);
    if (progress >= 0.98) setProgress(1);
  }, {passive:false});

  // click to open
  hero.addEventListener('click', e => { if (!opened) animateTo(1, 260); });

  // init
  setProgress(0);

  // если нужно — обновляем gap при ресайзе (чтобы gap в px пересчитался)
  window.addEventListener('resize', () => {
    // пересчёт по текущему progress
    setProgress(progress);
  });
})();
</script>
</body>
  </html>

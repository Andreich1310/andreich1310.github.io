<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Doors — upgraded (slider snap fixed)</title>

<style>
:root{
  --gap-start:.5;
  --gap-end:50;
}

html,body{
  height:100%;
  margin:0;
  overflow:hidden;
  font-family:system-ui;
}

.hero{
  position:fixed;
  inset:0;
  display:flex;
  perspective:1000px;
  z-index:100;
  transition:opacity .35s cubic-bezier(.22,.61,.36,1);
  touch-action:none;
}

.hero.dragging .door,
.hero.dragging .panel,
.hero.dragging .door img,
.hero.dragging .door-shadow,
.hero.dragging .hint{
  transition:none !important;
}

.door{
  width:50%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  will-change:transform;
  overflow:visible;
}

.left{ transform-origin:right center; }
.right{ transform-origin:left center; }

.panel{
  position:absolute;
  inset:0;
  transform-style:preserve-3d;
  will-change:transform;
  transition:transform .35s cubic-bezier(.22,.61,.36,1);
}

.left .panel{ transform-origin:right bottom; }
.right .panel{ transform-origin:left bottom; }

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  border:1px solid rgba(0,0,0,.08);
  pointer-events:none;
  z-index:70;
}

.panel img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  position:relative;
  z-index:60;
  will-change:transform;
  transition:transform .35s cubic-bezier(.22,.61,.36,1);
}

.left .panel img{ object-position:left center; }
.right .panel img{ object-position:right center; }

.door-shadow{
  position:absolute;
  top:0;
  bottom:0;
  width:10vw;
  filter:blur(18px);
  opacity:.9;
  pointer-events:none;
  transform-style:preserve-3d;
  transition: opacity .22s linear, transform .22s linear;
  transform: translateZ(-80px);
  z-index:40;
}
.door-shadow.left{
  right:-6vw;
  background:linear-gradient(to right,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent);
}
.door-shadow.right{
  left:-6vw;
  background:linear-gradient(to left,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent);
}

.inner-edge{
  position:absolute;
  top:0;
  bottom:0;
  width:16px;
  z-index:90;
  pointer-events:none;
  mix-blend-mode:multiply;
}
.left .inner-edge{ right:0; background:linear-gradient(to left, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }
.right .inner-edge{ left:0; background:linear-gradient(to right, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }

.hint{
  position:absolute;
  left:50%;
  bottom:12vh;
  transform:translateX(-50%);
  z-index:120;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  pointer-events:none;
  transition:opacity .18s;
}
.hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; }
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.label{ background:rgba(255,255,255,.96); padding:6px 12px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px; }

.gap-light{
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:6px;
  transform:translateX(-50%);
  pointer-events:none;
  z-index:20;
  background: linear-gradient(180deg, rgba(255,245,220,0.95), rgba(255,230,160,0.6));
  filter: blur(18px);
  opacity:0;
  transition: opacity .26s linear, width .26s linear;
}

.slider{
  position:relative;
  height:100vh;
  overflow-y:auto;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
}

.slide{
  height:100vh;
  scroll-snap-align:start;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@media (max-width:520px){
  .door-shadow{ width:14vw; filter:blur(12px); }
  .inner-edge{ width:12px; }
  .door-shadow.left{ right:-10vw; }
  .door-shadow.right{ left:-10vw; }
  .gap-light{ width:10px; filter: blur(12px); }
}
</style>
</head>

<body>

<div class="hero" id="hero" aria-hidden="false">
  <div class="gap-light" id="gapLight" aria-hidden="true"></div>

  <div class="door left" id="leftDoor">
    <div class="panel">
      <div class="door-shadow left"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="door right" id="rightDoor">
    <div class="panel">
      <div class="door-shadow right"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<div class="slider" id="slider">
  <section class="slide"><img src="center.svg" alt=""></section>
  <section class="slide"><img src="Левая web.svg" alt=""></section>
  <section class="slide"><img src="Правая web.svg" alt=""></section>
</div>

<script>
(function(){
/* --- элементы и константы (как в твоей версии) --- */
const hero = document.getElementById('hero');
const leftDoor = document.getElementById('leftDoor');
const rightDoor = document.getElementById('rightDoor');
const leftPanel = leftDoor.querySelector('.panel');
const rightPanel = rightDoor.querySelector('.panel');
const leftImg = leftDoor.querySelector('img');
const rightImg = rightDoor.querySelector('img');
const leftShadow = leftDoor.querySelector('.door-shadow');
const rightShadow = rightDoor.querySelector('.door-shadow');
const gapLight = document.getElementById('gapLight');
const hint = document.getElementById('hint');
const slider = document.getElementById('slider');

const SWIPE_DISTANCE_FACTOR = 0.12;
const DISABLE_HERO_AT = 0.98;
const initialGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-start')) || 0.5;
const maxGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-end')) || 50;
const rot = 38;
const FADE_START = 0.93;
const FADE_END = 0.98;

let progress = 0;
let isDragging = false;
let potentialClose = false;
let startY = 0;
let startProgress = 0;
let lastMoveTime = 0;
let lastMoveY = 0;
let velocity = 0;
let rafId = 0;
let pendingProgress = 0;
let heroVisible = true;
let didVibrate = false;
const clamp = v => Math.max(0, Math.min(1, v));

/* slider snap state */
const slides = Array.from(document.querySelectorAll('.slide'));
let currentSlide = 0;
let isScrollingTo = false;
let wheelLock = false;
let isSliderPointer = false;
let startSliderY = 0;
let startSliderTime = 0;

/* helper scroll to index (locks until animation ends) */
function scrollToIndex(i, smooth = true){
  i = Math.max(0, Math.min(slides.length - 1, i));
  currentSlide = i;
  isScrollingTo = true;
  // ensure integer pixels
  const target = Math.round(i * slider.clientHeight);
  slider.scrollTo({ top: target, behavior: smooth ? 'smooth' : 'auto' });
  // release lock after a bit (slightly longer than CSS animation)
  clearTimeout(scrollToIndex._t);
  scrollToIndex._t = setTimeout(()=>{ isScrollingTo = false; wheelLock = false; }, 480);
}

/* update currentSlide on natural scroll (unless we're programmatically scrolling) */
slider.addEventListener('scroll', ()=>{
  if(isScrollingTo) return;
  const idx = Math.round(slider.scrollTop / slider.clientHeight);
  if(idx !== currentSlide) currentSlide = idx;
});

/* block/unblock slider (as before) */
function blockSlider(){
  slider.style.pointerEvents = 'none';
  slider.style.overflowY = 'hidden';
}
function unblockSlider(){
  slider.style.pointerEvents = 'auto';
  slider.style.overflowY = 'auto';
}
function setHeroVisible(visible){
  if(heroVisible === visible) return;
  heroVisible = visible;
  hero.style.pointerEvents = visible ? 'auto' : 'none';
  hero.setAttribute('aria-hidden', visible ? 'false' : 'true');
  if(visible) blockSlider(); else unblockSlider();
}
function setDraggingState(active){
  if(active) hero.classList.add('dragging');
  else hero.classList.remove('dragging');
}

/* render (как у тебя) */
function render(p){
  progress = clamp(p);

  const shift = initialGap + progress * (maxGap - initialGap);
  const depth = progress * 80;
  const tilt = -progress * 6;
  const scaleY = 1 + progress * 0.12;

  leftDoor.style.transform =
    `translateX(${-shift}vw) rotateY(${-progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;
  rightDoor.style.transform =
    `translateX(${shift}vw) rotateY(${progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;

  leftPanel.style.transform = `scaleY(${scaleY})`;
  rightPanel.style.transform = `scaleY(${scaleY})`;

  const imgZ = -progress * 20;
  leftImg.style.transform = `translateZ(${imgZ}px)`;
  rightImg.style.transform = `translateZ(${imgZ}px)`;

  leftShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));
  rightShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));

  hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

  const lightStart = 0.12;
  const lightEnd = 0.9;
  if(progress <= lightStart) {
    gapLight.style.opacity = '0';
    gapLight.style.width = '6px';
  } else {
    const lt = Math.min(1, (progress - lightStart) / (lightEnd - lightStart));
    gapLight.style.opacity = String(lt * 0.95);
    const w = 6 + lt * 18;
    gapLight.style.width = `${w}px`;
  }

  let fade = 1;
  if(progress >= FADE_START){
    const t = Math.min(1, (progress - FADE_START) / (FADE_END - FADE_START));
    fade = 1 - t;
  }
  hero.style.opacity = String(Math.max(0, fade));

  setHeroVisible(progress < DISABLE_HERO_AT);

  if(progress >= DISABLE_HERO_AT && !didVibrate){
    didVibrate = true;
    try { navigator.vibrate && navigator.vibrate(8); } catch(e){}
  }
  if(progress < DISABLE_HERO_AT && didVibrate){
    didVibrate = false;
  }
}

function scheduleRender(p){
  pendingProgress = clamp(p);
  if(rafId) return;
  rafId = requestAnimationFrame(() => {
    rafId = 0;
    render(pendingProgress);
  });
}

/* Apple-style easing with small overshoot */
function animateTo(target, duration = 420){
  const from = progress;
  const start = performance.now();
  const c1 = 1.70158;
  const c3 = c1 + 1;
  function step(now){
    const tRaw = Math.min(1, (now - start) / duration);
    const eased = 1 + c3 * Math.pow(tRaw - 1, 3) + c1 * Math.pow(tRaw - 1, 2);
    render(from + (target - from) * eased);
    if(tRaw < 1) requestAnimationFrame(step);
    else render(target);
  }
  requestAnimationFrame(step);
}

/* Pointer handling for opening/closing (как было) */
window.addEventListener('pointerdown', function(e){
  if(e.target.closest('.hero') && heroVisible){
    isDragging = true; potentialClose = false;
    setDraggingState(true);
    startY = e.clientY; startProgress = progress;
    lastMoveTime = performance.now(); lastMoveY = e.clientY; velocity = 0;
    e.preventDefault && e.preventDefault();
    return;
  }
  if(e.target.closest('#slider') && !heroVisible){
    // start slider-focused pointer capture
    isSliderPointer = true;
    startSliderY = e.clientY;
    startSliderTime = performance.now();
    startProgress = progress;
    // prevent other handlers from interfering
    e.preventDefault && e.preventDefault();
    e.stopPropagation && e.stopPropagation();
    slider.setPointerCapture?.(e.pointerId);
    return;
  }
}, { passive:false });

window.addEventListener('pointermove', function(e){
  const now = performance.now();
  if(isDragging){
    const dy = startY - e.clientY;
    const swipeDistance = window.innerHeight * SWIPE_DISTANCE_FACTOR;
    const deltaProgress = dy / swipeDistance;
    scheduleRender(startProgress + deltaProgress);
    const dt = Math.max(8, now - lastMoveTime);
    const v = (lastMoveY - e.clientY) / dt;
    velocity = velocity * 0.6 + v * 0.4;
    lastMoveTime = now; lastMoveY = e.clientY;
    e.preventDefault && e.preventDefault();
    return;
  }
  if(isSliderPointer){
    // prevent native scroll inertia while pointer active on slider
    e.preventDefault && e.preventDefault();
    e.stopPropagation && e.stopPropagation();
    return;
  }
  if(potentialClose){
    const dy = startProgress - e.clientY;
    const threshold = 8;
    if(Math.abs(dy) > threshold){
      if(dy < 0){
        isDragging = true; potentialClose = false;
        setHeroVisible(true);
        setDraggingState(true);
        startProgress = progress; startY = e.clientY;
        lastMoveTime = now; lastMoveY = e.clientY; velocity = 0;
        e.preventDefault && e.preventDefault();
      } else {
        potentialClose = false;
      }
    }
    return;
  }
}, { passive:false });

window.addEventListener('pointerup', function(e){
  if(isDragging){
    const projectionMs = 180;
    const projected = clamp(progress + velocity * projectionMs / (window.innerHeight * SWIPE_DISTANCE_FACTOR));
    const target = (projected > 0.5) ? 1 : 0;
    const dist = Math.abs(target - progress);
    const dur = Math.min(700, Math.max(180, 280 + dist * 480));
    animateTo(target, dur);
  }
  if(isSliderPointer){
    // handle slider pointer release: compute dy and velocity from startSlider*
    const endY = e.clientY;
    const dy = startSliderY - endY;
    const dt = Math.max(8, performance.now() - startSliderTime);
    const v = dy / dt; // px per ms
    const thresholdDistance = Math.max(36, window.innerHeight * 0.04); // px
    const thresholdVelocity = 0.25; // px/ms
    let targetIndex = currentSlide;
    if(dy > thresholdDistance || v > thresholdVelocity){
      targetIndex = currentSlide + 1;
    } else if(dy < -thresholdDistance || v < -thresholdVelocity){
      targetIndex = currentSlide - 1;
    } else {
      // small move -> snap to nearest
      targetIndex = Math.round(slider.scrollTop / slider.clientHeight);
    }
    scrollToIndex(targetIndex, true);
    try{ slider.releasePointerCapture && slider.releasePointerCapture(e.pointerId); }catch(e){}
  }
  isDragging = false; potentialClose = false; isSliderPointer = false;
  startY = 0; startProgress = progress; velocity = 0;
  setDraggingState(false);
}, { passive:true });

/* Wheel behavior when slider active: one wheel gesture = one slide */
window.addEventListener('wheel', function(e){
  if(heroVisible) return; // leave hero wheel logic intact
  e.preventDefault();
  if(wheelLock || isScrollingTo) return;
  wheelLock = true;
  const dir = e.deltaY > 0 ? 1 : -1;
  scrollToIndex(currentSlide + dir, true);
}, { passive:false });

/* Resize: keep scroll aligned */
window.addEventListener('resize', function(){
  // re-scroll to current index to keep snap alignment
  scrollToIndex(currentSlide, false);
});

/* init */
blockSlider();
render(0);
window.addEventListener('resize', () => render(progress));
})();
</script>

</body>
  </html>

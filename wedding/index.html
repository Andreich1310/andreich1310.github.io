<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Приглашение</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
}

/* ===== HERO (двери) ===== */

.hero{
position:fixed;
inset:0;
z-index:10;
overflow:hidden;
pointer-events:none;
}

.door{
position:absolute;
inset:0;
transition:transform .8s cubic-bezier(.22,.9,.2,1);
}

.left{
clip-path: inset(0 50% 0 0);
}

.right{
clip-path: inset(0 0 0 50%);
}

.door img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

/* открытие */

.hero.open .left{
transform:translateX(-50vw);
}

.hero.open .right{
transform:translateX(50vw);
}

/* ===== SLIDER ===== */

.slider{
height:100dvh;
overflow-y:auto;
scroll-snap-type:y mandatory;
}

.slide{
height:100dvh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
}

.slide img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

</style>
</head>

<body>

<!-- двери -->
<div class="hero" id="hero">

<div class="door left">
<img src="Обложка web.svg">
</div>

<div class="door right">
<img src="Обложка web.svg">
</div>

</div>

<!-- основной контент -->
<div class="slider" id="slider">

<div class="slide">
<img src="center.svg">
</div>

<div class="slide">
<img src="Левая web.svg">
</div>

<div class="slide">
<object data="Правая web.svg" type="image/svg+xml"></object>
</div>

</div>


<script>

const hero = document.getElementById("hero")
const slider = document.getElementById("slider")

let startY = null
let opened = false

window.addEventListener("touchstart",e=>{
startY = e.touches[0].clientY
},{passive:true})

window.addEventListener("touchmove",e=>{

if(opened) return

let dy = e.touches[0].clientY - startY

if(dy < -40){
openDoors()
}

},{passive:true})


window.addEventListener("wheel",e=>{

if(opened) return

if(e.deltaY > 30){
openDoors()
}

},{passive:true})


function openDoors(){

opened = true

hero.classList.add("open")

document.body.style.overflow="auto"

setTimeout(()=>{
hero.style.display="none"
},900)

}

</script>

</body>
</html>

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Doors — JS-controlled slider</title>

<style>
:root{
  --gap-start:.5;
  --gap-end:50;
}

html,body{
  height:100%;
  margin:0;
  overflow:hidden;
  font-family:system-ui;
}

.hero{
  position:fixed;
  inset:0;
  display:flex;
  perspective:1000px;
  z-index:100;
  transition:opacity .35s cubic-bezier(.22,.61,.36,1);
  touch-action:none;
}

.hero.dragging .door,
.hero.dragging .panel,
.hero.dragging .door img,
.hero.dragging .door-shadow,
.hero.dragging .hint{
  transition:none !important;
}

.door{ width:50%; height:100%; position:relative; transform-style:preserve-3d; will-change:transform; overflow:visible; }
.left{ transform-origin:right center; } .right{ transform-origin:left center; }

.panel{ position:absolute; inset:0; transform-style:preserve-3d; will-change:transform; transition:transform .35s cubic-bezier(.22,.61,.36,1); }
.left .panel{ transform-origin:right bottom; } .right .panel{ transform-origin:left bottom; }

.panel::before{ content:""; position:absolute; inset:0; border:1px solid rgba(0,0,0,.08); pointer-events:none; z-index:70; }

.panel img{ width:100%; height:100%; object-fit:cover; display:block; position:relative; z-index:60; will-change:transform; transition:transform .35s cubic-bezier(.22,.61,.36,1); }
.left .panel img{ object-position:left center; } .right .panel img{ object-position:right center; }

.door-shadow{ position:absolute; top:0; bottom:0; width:10vw; filter:blur(18px); opacity:.9; pointer-events:none; transform-style:preserve-3d; transition: opacity .22s linear, transform .22s linear; transform: translateZ(-80px); z-index:40; }
.door-shadow.left{ right:-6vw; background:linear-gradient(to right,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }
.door-shadow.right{ left:-6vw; background:linear-gradient(to left,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }

.inner-edge{ position:absolute; top:0; bottom:0; width:16px; z-index:90; pointer-events:none; mix-blend-mode:multiply; }
.left .inner-edge{ right:0; background:linear-gradient(to left, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }
.right .inner-edge{ left:0; background:linear-gradient(to right, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }

.hint{ position:absolute; left:50%; bottom:12vh; transform:translateX(-50%); z-index:120; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; transition:opacity .18s; }
.hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; } @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.label{ background:rgba(255,255,255,.96); padding:6px 12px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px; }

.gap-light{ position:absolute; left:50%; top:0; bottom:0; width:6px; transform:translateX(-50%); pointer-events:none; z-index:20; background: linear-gradient(180deg, rgba(255,245,220,0.95), rgba(255,230,160,0.6)); filter: blur(18px); opacity:0; transition: opacity .26s linear, width .26s linear; }

.slider{ position:relative; height:100vh; /* keep overflow auto so scrollTop works */ overflow-y:auto; scroll-snap-type:y mandatory; -webkit-overflow-scrolling:touch; touch-action:none; /* prevent browser gesture handling */ }
.slide{ height:100vh; scroll-snap-align:start; }
.slide img{ width:100%; height:100%; object-fit:cover; display:block; }

@media (max-width:520px){ .door-shadow{ width:14vw; filter:blur(12px); } .inner-edge{ width:12px; } .door-shadow.left{ right:-10vw; } .door-shadow.right{ left:-10vw; } .gap-light{ width:10px; } }
</style>
</head>

<body>

<div class="hero" id="hero" aria-hidden="false">
  <div class="gap-light" id="gapLight" aria-hidden="true"></div>

  <div class="door left" id="leftDoor">
    <div class="panel">
      <div class="door-shadow left"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="door right" id="rightDoor">
    <div class="panel">
      <div class="door-shadow right"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<div class="slider" id="slider">
  <section class="slide"><img src="center.svg" alt=""></section>
  <section class="slide"><img src="Левая web.svg" alt=""></section>
  <section class="slide"><img src="Правая web.svg" alt=""></section>
</div>

<script>
(function(){
/* ---------- elements ---------- */
const hero = document.getElementById('hero');
const gapLight = document.getElementById('gapLight');
const leftDoor = document.getElementById('leftDoor');
const rightDoor = document.getElementById('rightDoor');
const leftPanel = leftDoor.querySelector('.panel');
const rightPanel = rightDoor.querySelector('.panel');
const leftImg = leftDoor.querySelector('img');
const rightImg = rightDoor.querySelector('img');
const leftShadow = leftDoor.querySelector('.door-shadow');
const rightShadow = rightDoor.querySelector('.door-shadow');
const hint = document.getElementById('hint');
const slider = document.getElementById('slider');
const slides = Array.from(slider.querySelectorAll('.slide'));

/* ---------- settings ---------- */
const SWIPE_DISTANCE_FACTOR = 0.12;
const DISABLE_HERO_AT = 0.98;
const initialGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-start')) || 0.5;
const maxGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-end')) || 50;
const rot = 38;
const FADE_START = 0.93;
const FADE_END = 0.98;

/* ---------- state ---------- */
let progress = 0;
let isDragging = false;            // dragging hero
let potentialClose = false;
let startY = 0, startProgress = 0, lastMoveTime = 0, lastMoveY = 0, velocity = 0;

let rafId = 0, pendingProgress = 0;
let heroVisible = true;
let didVibrate = false;

/* slider controlled state */
let sliderDragging = false;
let sStartY = 0, sStartScroll = 0, sLastTime = 0, sLastY = 0, sVelocity = 0;
let scrollAnimId = 0;
let currentSlide = 0;
const slideCount = slides.length;
const vh = () => window.innerHeight;

/* helper */
const clamp01 = v => Math.max(0, Math.min(1, v));
const clampIndex = i => Math.max(0, Math.min(slideCount - 1, i));

/* ---------- slider: disable native 'multi-swipe' by JS control ---------- */
/* We'll keep overflow:auto (so scrollTop works) but intercept pointer events on slider,
   call preventDefault and set slider.scrollTop manually during drag.
   On pointerup we'll compute direction & velocity and animate to a target slide (only +/-1 max). */

function animateScrollToIndex(targetIndex, duration = 360){
  targetIndex = clampIndex(targetIndex);
  const start = performance.now();
  const from = slider.scrollTop;
  const to = targetIndex * vh();
  const delta = to - from;
  if (scrollAnimId) cancelAnimationFrame(scrollAnimId);
  function step(now){
    const t = Math.min(1, (now - start) / duration);
    // easeOutCubic
    const ease = 1 - Math.pow(1 - t, 3);
    slider.scrollTop = from + delta * ease;
    if(t < 1) scrollAnimId = requestAnimationFrame(step);
    else {
      scrollAnimId = 0;
      slider.scrollTop = to;
      currentSlide = targetIndex;
    }
  }
  scrollAnimId = requestAnimationFrame(step);
}

/* wheel on slider -> stepwise behavior (debounced) */
let sliderWheelTimer = null;
slider.addEventListener('wheel', function(e){
  // only handle when hero closed (slider active)
  if(heroVisible) return;
  e.preventDefault();
  const dir = e.deltaY > 0 ? 1 : -1;
  // prevent super-fast wheel jumps -> debounce small time window
  if(sliderWheelTimer) return;
  sliderWheelTimer = setTimeout(()=>{ sliderWheelTimer = null; }, 120);
  animateScrollToIndex(currentSlide + dir, 360);
});

/* pointer handling on slider */
slider.addEventListener('pointerdown', function(e){
  if(heroVisible) return; // ignore if hero still visible
  slider.setPointerCapture && slider.setPointerCapture(e.pointerId);
  sliderDragging = true;
  sStartY = e.clientY;
  sStartScroll = slider.scrollTop;
  sLastY = e.clientY;
  sLastTime = performance.now();
  sVelocity = 0;
  // stop any ongoing scroll animation
  if(scrollAnimId) { cancelAnimationFrame(scrollAnimId); scrollAnimId = 0; }
}, { passive:false });

slider.addEventListener('pointermove', function(e){
  if(!sliderDragging) return;
  const now = performance.now();
  const dy = sStartY - e.clientY;
  // apply the drag as immediate scroll (no huge multiplier)
  slider.scrollTop = sStartScroll + dy;
  const dt = Math.max(8, now - sLastTime);
  const v = (sLastY - e.clientY) / dt;
  sVelocity = sVelocity * 0.6 + v * 0.4;
  sLastTime = now; sLastY = e.clientY;
  e.preventDefault && e.preventDefault();
}, { passive:false });

slider.addEventListener('pointerup', function(e){
  if(!sliderDragging) return;
  sliderDragging = false;
  slider.releasePointerCapture && slider.releasePointerCapture(e.pointerId);
  // determine swipe
  const dy = sStartY - e.clientY;
  const absDy = Math.abs(dy);
  const swipeThreshold = vh() * SWIPE_DISTANCE_FACTOR; // ~12% of height
  // velocity in px/ms -> scale projection
  const projected = slider.scrollTop + sVelocity * 180; // like earlier projection
  const projectedIndex = Math.round(projected / vh());
  // allowed move max 1 index from currentSlide
  const maxUp = Math.min(currentSlide + 1, slideCount - 1);
  const maxDown = Math.max(currentSlide - 1, 0);
  let targetIndex = currentSlide;
  if(absDy > swipeThreshold){
    // strong swipe: direction by dy sign
    targetIndex = dy > 0 ? Math.min(currentSlide + 1, slideCount - 1) : Math.max(currentSlide - 1, 0);
  } else {
    // small swipe -> use projection or nearest
    const projIdx = clampIndex(projectedIndex);
    // restrict to one-step change
    if(projIdx > currentSlide) targetIndex = Math.min(currentSlide + 1, slideCount - 1);
    else if(projIdx < currentSlide) targetIndex = Math.max(currentSlide - 1, 0);
    else targetIndex = currentSlide;
  }
  animateScrollToIndex(targetIndex, 360);
}, { passive:false });

/* also prevent native touchmove default (extra safety on some browsers) */
slider.addEventListener('touchmove', function(e){ if(!heroVisible) e.preventDefault(); }, { passive:false });

/* keyboard nav for slider when active */
window.addEventListener('keydown', function(e){
  if(heroVisible) return;
  if(e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); animateScrollToIndex(currentSlide + 1); }
  if(e.key === 'ArrowUp'   || e.key === 'PageUp')   { e.preventDefault(); animateScrollToIndex(currentSlide - 1); }
});

/* update currentSlide on native scroll end (in case user scrolls programmatically) */
let scrollSettleTimer = null;
slider.addEventListener('scroll', function(){
  if(scrollAnimId) return; // ignore while animating
  if(scrollSettleTimer) clearTimeout(scrollSettleTimer);
  scrollSettleTimer = setTimeout(()=>{
    currentSlide = Math.round(slider.scrollTop / vh());
  }, 80);
});

/* ---------- rest of hero / doors logic (kept and integrated) ---------- */

const SWIPE_FACTOR = SWIPE_DISTANCE_FACTOR;
const FADE_S = FADE_START, FADE_E = FADE_END;

function blockSlider(){
  // we still keep overflow:auto so scrollTop works; pointerEvents false prevents pointer down
  slider.style.pointerEvents = 'none';
}
function unblockSlider(){
  slider.style.pointerEvents = 'auto';
}

/* initial block until hero opened */
blockSlider();

function setHeroVisible(visible){
  if(visible){
    hero.style.pointerEvents = 'auto';
    hero.setAttribute('aria-hidden','false');
    blockSlider();
  } else {
    hero.style.pointerEvents = 'none';
    hero.setAttribute('aria-hidden','true');
    unblockSlider();
  }
}

/* dragging class helpers (hero dragging) */
function setDraggingState(active){
  if(active) hero.classList.add('dragging'); else hero.classList.remove('dragging');
}

/* render doors (kept your logic) */
function render(p){
  progress = clamp01(p);
  const shift = initialGap + progress * (maxGap - initialGap);
  const depth = progress * 80;
  const tilt = -progress * 6;
  const scaleY = 1 + progress * 0.12;

  leftDoor.style.transform = `translateX(${-shift}vw) rotateY(${-progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;
  rightDoor.style.transform = `translateX(${shift}vw) rotateY(${progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;

  leftPanel.style.transform = `scaleY(${scaleY})`;
  rightPanel.style.transform = `scaleY(${scaleY})`;

  const imgZ = -progress * 20;
  leftImg.style.transform = `translateZ(${imgZ}px)`;
  rightImg.style.transform = `translateZ(${imgZ}px)`;

  leftShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));
  rightShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));
  hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

  // gap light
  const lightStart = 0.12;
  const lightEnd = 0.9;
  if(progress <= lightStart){
    gapLight.style.opacity = '0';
    gapLight.style.width = '6px';
  } else {
    const lt = Math.min(1, (progress - lightStart) / (lightEnd - lightStart));
    gapLight.style.opacity = String(lt * 0.95);
    const w = 6 + lt * 18;
    gapLight.style.width = `${w}px`;
  }

  // fade hero near end
  let fade = 1;
  if(progress >= FADE_S){
    const t = Math.min(1, (progress - FADE_S) / (FADE_E - FADE_S));
    fade = 1 - t;
  }
  hero.style.opacity = String(Math.max(0, fade));

  setHeroVisible(progress < DISABLE_HERO_AT);

  if(progress >= DISABLE_HERO_AT && !didVibrate){
    didVibrate = true;
    try { navigator.vibrate && navigator.vibrate(8); } catch(e){}
  }
  if(progress < DISABLE_HERO_AT && didVibrate) didVibrate = false;
}

/* requestAnimationFrame batching for render calls (kept) */
function scheduleRender(p){
  pendingProgress = clamp01(p);
  if(rafId) return;
  rafId = requestAnimationFrame(() => { rafId = 0; render(pendingProgress); });
}

/* animateTo with Apple-style small overshoot (kept) */
function animateTo(target, duration = 420){
  const from = progress;
  const start = performance.now();
  const c1 = 1.70158, c3 = c1 + 1;
  function step(now){
    const tRaw = Math.min(1, (now - start) / duration);
    const eased = 1 + c3 * Math.pow(tRaw - 1, 3) + c1 * Math.pow(tRaw - 1, 2);
    render(from + (target - from) * eased);
    if(tRaw < 1) requestAnimationFrame(step);
    else render(target);
  }
  requestAnimationFrame(step);
}

/* pointer handling for hero (kept, with scheduleRender) */
window.addEventListener('pointerdown', function(e){
  if(e.target.closest('.hero') && hero.style.pointerEvents !== 'none'){
    isDragging = true; potentialClose = false;
    setDraggingState(true);
    startY = e.clientY; startProgress = progress;
    lastMoveTime = performance.now(); lastMoveY = e.clientY; velocity = 0;
    e.preventDefault && e.preventDefault();
    return;
  }
  if(e.target.closest('#slider') && !heroVisible){
    if(slider.scrollTop <= 2){
      potentialClose = true;
      startY = e.clientY; startProgress = progress;
      lastMoveTime = performance.now(); lastMoveY = e.clientY; velocity = 0;
    } else {
      potentialClose = false;
    }
    return;
  }
}, { passive:false });

window.addEventListener('pointermove', function(e){
  const now = performance.now();
  if(isDragging){
    const dy = startY - e.clientY;
    const swipeDistance = window.innerHeight * SWIPE_DISTANCE_FACTOR;
    const deltaProgress = dy / swipeDistance;
    scheduleRender(startProgress + deltaProgress);
    const dt = Math.max(8, now - lastMoveTime);
    const v = (lastMoveY - e.clientY) / dt;
    velocity = velocity * 0.6 + v * 0.4;
    lastMoveTime = now; lastMoveY = e.clientY;
    e.preventDefault && e.preventDefault();
    return;
  }
  if(potentialClose){
    const dy = startY - e.clientY;
    const threshold = 8;
    if(Math.abs(dy) > threshold){
      if(dy < 0){
        isDragging = true; potentialClose = false;
        setHeroVisible(true);
        setDraggingState(true);
        startProgress = progress; startY = e.clientY;
        lastMoveTime = now; lastMoveY = e.clientY; velocity = 0;
        e.preventDefault && e.preventDefault();
      } else {
        potentialClose = false;
      }
    }
    return;
  }
}, { passive:false });

window.addEventListener('pointerup', function(){
  if(isDragging){
    const projectionMs = 180;
    const projected = clamp01(progress + velocity * projectionMs / (window.innerHeight * SWIPE_DISTANCE_FACTOR));
    const target = (projected > 0.5) ? 1 : 0;
    const dist = Math.abs(target - progress);
    const dur = Math.min(700, Math.max(180, 280 + dist * 480));
    animateTo(target, dur);
  }
  isDragging = false; potentialClose = false; startY = 0; startProgress = progress; velocity = 0;
  setDraggingState(false);
}, { passive:true });

/* wheel while hero visible -> control hero; handled elsewhere? maintain previous behavior */
let heroWheelTimer = null;
window.addEventListener('wheel', function(e){
  // if hero is visible we adjust hero progress, otherwise slider wheel handled above
  if(!heroVisible) return;
  e.preventDefault();
  const sensitivity = 0.003;
  scheduleRender(progress + e.deltaY * sensitivity);
  if(heroWheelTimer) clearTimeout(heroWheelTimer);
  heroWheelTimer = setTimeout(()=>{
    heroWheelTimer = null;
    const target = (progress > 0.5) ? 1 : 0;
    animateTo(target, 360);
  }, 110);
}, { passive:false });

/* init */
render(0);
window.addEventListener('resize', () => {
  // keep slider snapped to currentSlide if resized
  slider.scrollTop = currentSlide * vh();
  render(progress);
});
})();
</script>

</body>
</html>

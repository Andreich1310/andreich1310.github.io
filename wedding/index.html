<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Doors — with robust JS slider (physics, single-swipe)</title>

<style>
:root{
  --gap-start:.5;
  --gap-end:50;
}
html,body{height:100%;margin:0;overflow:hidden;font-family:system-ui;}
/* HERO (doors) */
.hero{
  position:fixed; inset:0; display:flex; perspective:1000px; z-index:100;
  transition:opacity .35s cubic-bezier(.22,.61,.36,1); touch-action:none;
}
.hero.dragging .door,
.hero.dragging .panel,
.hero.dragging .door img,
.hero.dragging .door-shadow,
.hero.dragging .hint{ transition:none !important; }

.door{ width:50%; height:100%; position:relative; transform-style:preserve-3d; will-change:transform; overflow:visible; }
.left{ transform-origin:right center; } .right{ transform-origin:left center; }

.panel{ position:absolute; inset:0; transform-style:preserve-3d; will-change:transform; transition:transform .35s cubic-bezier(.22,.61,.36,1); }
.left .panel{ transform-origin:right bottom; } .right .panel{ transform-origin:left bottom; }

.panel::before{ content:""; position:absolute; inset:0; border:1px solid rgba(0,0,0,.08); pointer-events:none; z-index:70; }

.panel img{ width:100%; height:100%; object-fit:cover; display:block; position:relative; z-index:60; will-change:transform; transition:transform .35s cubic-bezier(.22,.61,.36,1); }
.left .panel img{ object-position:left center; } .right .panel img{ object-position:right center; }

.door-shadow{ position:absolute; top:0; bottom:0; width:10vw; filter:blur(18px); opacity:.9; pointer-events:none; transform-style:preserve-3d; transition: opacity .22s linear, transform .22s linear; transform: translateZ(-80px); z-index:40; }
.door-shadow.left{ right:-6vw; background:linear-gradient(to right,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }
.door-shadow.right{ left:-6vw; background:linear-gradient(to left,rgba(0,0,0,.72), rgba(0,0,0,.32), transparent); }

.inner-edge{ position:absolute; top:0; bottom:0; width:16px; z-index:90; pointer-events:none; mix-blend-mode:multiply; }
.left .inner-edge{ right:0; background:linear-gradient(to left, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }
.right .inner-edge{ left:0; background:linear-gradient(to right, rgba(0,0,0,.46), rgba(0,0,0,.06) 36%, transparent 100%); }

.hint{ position:absolute; left:50%; bottom:12vh; transform:translateX(-50%); z-index:120; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; transition:opacity .18s; }
.hint svg{ width:28px; height:28px; display:block; animation:bob 1.2s infinite ease-in-out; }
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.label{ background:rgba(255,255,255,.96); padding:6px 12px; border-radius:999px; box-shadow:0 6px 18px rgba(0,0,0,.08); font-size:13px; }

.gap-light{ position:absolute; left:50%; top:0; bottom:0; width:6px; transform:translateX(-50%); pointer-events:none; z-index:20;
  background: linear-gradient(180deg, rgba(255,245,220,0.95), rgba(255,230,160,0.6)); filter: blur(18px); opacity:0; transition: opacity .26s linear, width .26s linear; }

/* ===== Slider: JS-controlled track (no native scroll, no fling) ===== */
.slider{ position:relative; height:100vh; overflow:hidden; touch-action:none; z-index:1; } /* disable native fling */
.slider-track{
  position:relative;
  height:100%;
  width:100%;
  will-change:transform;
  transition: transform .45s cubic-bezier(.22,.61,.36,1);
  display:block;
}
.slide{ height:100vh; width:100%; display:block; }
.slide img{ width:100%; height:100%; object-fit:cover; display:block; }

/* small screens */
@media (max-width:520px){
  .door-shadow{ width:14vw; filter:blur(12px); }
  .inner-edge{ width:12px; }
  .door-shadow.left{ right:-10vw; }
  .door-shadow.right{ left:-10vw; }
  .gap-light{ width:10px; filter: blur(12px); }
}
</style>
</head>
<body>

<div class="hero" id="hero" aria-hidden="false">
  <div class="gap-light" id="gapLight" aria-hidden="true"></div>

  <div class="door left" id="leftDoor">
    <div class="panel">
      <div class="door-shadow left"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="door right" id="rightDoor">
    <div class="panel">
      <div class="door-shadow right"></div>
      <img src="Обложка web.svg" alt="">
      <div class="inner-edge"></div>
    </div>
  </div>

  <div class="hint" id="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<div class="slider" id="slider" aria-label="Slides">
  <div class="slider-track" id="track">
    <section class="slide"><img src="center.svg" alt=""></section>
    <section class="slide"><img src="Левая web.svg" alt=""></section>
    <section class="slide"><img src="Правая web.svg" alt=""></section>
  </div>
</div>

<script>
(function(){
/* ========== Elements & constants ========== */
const hero = document.getElementById('hero');
const leftDoor = document.getElementById('leftDoor');
const rightDoor = document.getElementById('rightDoor');
const leftPanel = leftDoor.querySelector('.panel');
const rightPanel = rightDoor.querySelector('.panel');
const leftImg = leftDoor.querySelector('img');
const rightImg = rightDoor.querySelector('img');
const leftShadow = leftDoor.querySelector('.door-shadow');
const rightShadow = rightDoor.querySelector('.door-shadow');
const gapLight = document.getElementById('gapLight');
const hint = document.getElementById('hint');

const slider = document.getElementById('slider');
const track = document.getElementById('track');
const slides = Array.from(track.querySelectorAll('.slide'));
const slideCount = slides.length;

const SWIPE_DISTANCE_FACTOR = 0.12;
const DISABLE_HERO_AT = 0.98;
const initialGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-start')) || 0.5;
const maxGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap-end')) || 50;
const rot = 38;
const FADE_START = 0.93;
const FADE_END = 0.98;

/* state */
let progress = 0;
let isDragging = false;
let potentialClose = false;
let startY = 0;
let startProgress = 0;
let lastMoveTime = 0;
let lastMoveY = 0;
let velocity = 0;
let rafId = 0;
let pendingProgress = 0;
let heroVisible = true;
let didVibrate = false;
const clamp = v => Math.max(0, Math.min(1, v));

/* slider state */
let index = 0;                 // current slide index
let isPointerSliding = false;  // user dragging slider
let slideStartY = 0;
let slideStartTime = 0;
let slideDragDelta = 0;
let animatingSlide = false;
let scrollCancel = null;

/* sizes */
function getViewportHeight(){ return window.innerHeight || document.documentElement.clientHeight; }

/* ====== Hero/doors rendering (unchanged logic but adapted) ====== */
function render(p){
  progress = clamp(p);

  const shift = initialGap + progress * (maxGap - initialGap);
  const depth = progress * 80;
  const tilt = -progress * 6;
  const scaleY = 1 + progress * 0.12;

  leftDoor.style.transform = `translateX(${-shift}vw) rotateY(${-progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;
  rightDoor.style.transform = `translateX(${shift}vw) rotateY(${progress * rot}deg) translateZ(${-depth}px) rotateX(${tilt}deg)`;

  leftPanel.style.transform = `scaleY(${scaleY})`;
  rightPanel.style.transform = `scaleY(${scaleY})`;

  const imgZ = -progress * 20;
  leftImg.style.transform = `translateZ(${imgZ}px)`;
  rightImg.style.transform = `translateZ(${imgZ}px)`;

  leftShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));
  rightShadow.style.opacity = String(Math.max(0, 0.9 - progress * 0.85));

  hint.style.opacity = String(Math.max(0, 1 - progress * 1.6));

  const lightStart = 0.12;
  const lightEnd = 0.9;
  if(progress <= lightStart){
    gapLight.style.opacity = '0';
    gapLight.style.width = '6px';
  } else {
    const lt = Math.min(1, (progress - lightStart) / (lightEnd - lightStart));
    gapLight.style.opacity = String(lt * 0.95);
    const w = 6 + lt * 18;
    gapLight.style.width = `${w}px`;
  }

  let fade = 1;
  if(progress >= FADE_START){
    const t = Math.min(1, (progress - FADE_START) / (FADE_END - FADE_START));
    fade = 1 - t;
  }
  hero.style.opacity = String(Math.max(0, fade));

  setHeroVisible(progress < DISABLE_HERO_AT);

  if(progress >= DISABLE_HERO_AT && !didVibrate){
    didVibrate = true;
    try{ navigator.vibrate && navigator.vibrate(8); }catch(e){}
  }
  if(progress < DISABLE_HERO_AT && didVibrate){
    didVibrate = false;
  }
}
function scheduleRender(p){
  pendingProgress = clamp(p);
  if(rafId) return;
  rafId = requestAnimationFrame(()=>{ rafId = 0; render(pendingProgress); });
}

/* show/hide hero (no display:none to avoid layout glitch) */
function blockSlider(){ slider.style.pointerEvents = 'none'; }
function unblockSlider(){ slider.style.pointerEvents = 'auto'; }
function setHeroVisible(visible){
  if(heroVisible === visible) return;
  heroVisible = visible;
  hero.style.pointerEvents = visible ? 'auto' : 'none';
  hero.setAttribute('aria-hidden', visible ? 'false' : 'true');
  if(visible) blockSlider(); else unblockSlider();
}
function setDraggingState(active){ if(active) hero.classList.add('dragging'); else hero.classList.remove('dragging'); }

/* ====== Doors animateTo (with small overshoot) ====== */
function animateTo(target, duration = 420){
  const from = progress;
  const start = performance.now();
  const c1 = 1.70158, c3 = c1 + 1;
  // cancel any slide animation to avoid fighting
  cancelSlideAnimation();
  function step(now){
    const tRaw = Math.min(1, (now - start) / duration);
    const eased = 1 + c3 * Math.pow(tRaw - 1, 3) + c1 * Math.pow(tRaw - 1, 2);
    render(from + (target - from) * eased);
    if(tRaw < 1) requestAnimationFrame(step);
    else render(target);
  }
  requestAnimationFrame(step);
}

/* ====== Slider: helpers ====== */
function setTrackTransform(y, withTransition = true, duration = 450){
  if(withTransition){
    track.style.transition = `transform ${duration}ms cubic-bezier(.22,.61,.36,1)`;
  } else {
    track.style.transition = 'none';
  }
  track.style.transform = `translateY(${ -y }px)`;
}
function indexToOffset(i){ return Math.round(i * getViewportHeight()); }

/* cancel ongoing slide animation */
function cancelSlideAnimation(){
  if(scrollCancel){
    scrollCancel.cancelled = true;
    scrollCancel = null;
    animatingSlide = false;
  }
}

/* animate to index (single-slide step) with RAF-based smooth scroll (cancelable) */
function animateToIndex(targetIndex, duration = 420){
  targetIndex = Math.max(0, Math.min(slideCount -1, targetIndex));
  if(targetIndex === index){
    // still ensure we snap exactly
    setTrackTransform(indexToOffset(index), true, 200);
    return Promise.resolve(index);
  }
  cancelSlideAnimation();
  animatingSlide = true;
  const startTop = indexToOffset(index);
  const targetTop = indexToOffset(targetIndex);
  const startTime = performance.now();
  const ease = t => 1 - Math.pow(1 - t, 3);

  // temporarily disable native overscroll by keeping overflow hidden (already hidden), ensure transition controlled by RAF
  const ctx = { cancelled: false };
  scrollCancel = ctx;

  return new Promise(resolve=>{
    function frame(now){
      if(ctx.cancelled){ animatingSlide = false; resolve(index); return; }
      const t = Math.min(1, (now - startTime)/duration);
      const v = ease(t);
      const pos = Math.round(startTop + (targetTop - startTop)*v);
      setTrackTransform(pos, false);
      if(t < 1){
        requestAnimationFrame(frame);
      } else {
        // finalize
        index = targetIndex;
        setTrackTransform(targetTop, true, 180);
        // small settle timeout
        setTimeout(()=>{ animatingSlide = false; scrollCancel = null; resolve(index); }, 200);
      }
    }
    requestAnimationFrame(frame);
  });
}

/* snap to nearest index (used on resize / minor moves) */
function snapToNearest(){
  const top = Math.round(-getTrackTranslateY());
  const nearest = Math.round(top / getViewportHeight());
  animateToIndex(nearest, 300);
}

/* read current track translateY (computed) */
function getTrackTranslateY(){
  const st = getComputedStyle(track).transform;
  if(!st || st === 'none') return 0;
  const m = st.match(/matrix\((.+)\)/);
  if(m){
    const vals = m[1].split(',').map(Number);
    // matrix(a, b, c, d, tx, ty) -> tx is vals[4], ty is vals[5] ; we used translateY so ty
    return vals[5] || 0;
  }
  const mm = st.match(/matrix3d\((.+)\)/);
  if(mm){
    const vals = mm[1].split(',').map(Number);
    return vals[13] || 0;
  }
  return 0;
}

/* ====== Pointer handlers for hero (open/close doors) ====== */
window.addEventListener('pointerdown', function(e){
  // if pointer on hero (doors visible and interactive)
  if(e.target.closest('.hero') && heroVisible){
    isDragging = true;
    potentialClose = false;
    setDraggingState(true);
    startY = e.clientY;
    startProgress = progress;
    lastMoveTime = performance.now(); lastMoveY = e.clientY; velocity = 0;
    // cancel any slide animation for safety
    cancelSlideAnimation();
    e.preventDefault && e.preventDefault();
    return;
  }

  // if hero hidden and pointer on slider, start slide drag
  if(e.target.closest('.slider') && !heroVisible){
    isPointerSliding = true;
    slideStartY = e.clientY;
    slideStartTime = performance.now();
    slideDragDelta = 0;
    // cancel any programmatic slide animation
    cancelSlideAnimation();
    // capture pointer on track to avoid other interactions
    try{ track.setPointerCapture && track.setPointerCapture(e.pointerId); }catch(e){}
    e.preventDefault && e.preventDefault();
    return;
  }
}, { passive:false });

window.addEventListener('pointermove', function(e){
  const now = performance.now();
  if(isDragging){
    const dy = startY - e.clientY;
    const swipeDistance = window.innerHeight * SWIPE_DISTANCE_FACTOR;
    const deltaProgress = dy / swipeDistance;
    scheduleRender(startProgress + deltaProgress);
    const dt = Math.max(8, now - lastMoveTime);
    const v = (lastMoveY - e.clientY)/dt;
    velocity = velocity*0.6 + v*0.4;
    lastMoveTime = now; lastMoveY = e.clientY;
    e.preventDefault && e.preventDefault();
    return;
  }

  if(isPointerSliding){
    // user drags slides: update track transform live without transition
    slideDragDelta = e.clientY - slideStartY; // positive = drag down (show previous)
    const offset = indexToOffset(index) - slideDragDelta; // how far the track should be (we invert since translateY is -offset)
    setTrackTransform(offset, false);
    e.preventDefault && e.preventDefault();
    return;
  }

  if(potentialClose){
    const dy = startY - e.clientY;
    const threshold = 8;
    if(Math.abs(dy) > threshold){
      if(dy < 0){
        isDragging = true; potentialClose = false;
        setHeroVisible(true);
        setDraggingState(true);
        startProgress = progress; startY = e.clientY;
        lastMoveTime = now; lastMoveY = e.clientY; velocity = 0;
        e.preventDefault && e.preventDefault();
      } else {
        potentialClose = false;
      }
    }
    return;
  }
}, { passive:false });

window.addEventListener('pointerup', function(e){
  // end door drag
  if(isDragging){
    const projectionMs = 180;
    const projected = clamp(progress + velocity * projectionMs / (window.innerHeight * SWIPE_DISTANCE_FACTOR));
    const target = (projected > 0.5) ? 1 : 0;
    const dist = Math.abs(target - progress);
    const dur = Math.min(700, Math.max(180, 280 + dist * 480));
    animateTo(target, dur);
  }

  // end slide drag
  if(isPointerSliding){
    const dy = slideStartY - e.clientY; // positive => swipe up => next slide
    const dt = Math.max(8, performance.now() - slideStartTime);
    const v = dy / dt; // px/ms
    // thresholds
    const thresholdDistance = Math.max(48, getViewportHeight() * 0.06); // px
    const thresholdVelocity = 0.35; // px/ms

    let target = index;
    if(dy > thresholdDistance || v > thresholdVelocity){
      target = Math.min(slideCount - 1, index + 1);
    } else if(dy < -thresholdDistance || v < -thresholdVelocity){
      target = Math.max(0, index - 1);
    } else {
      // small move -> snap back to current
      target = index;
    }

    // animate to target (ensures only one slide step)
    animateToIndex(target, 420);

    // release pointer capture
    try{ track.releasePointerCapture && track.releasePointerCapture(e.pointerId); }catch(err){}
  }

  isDragging = false; potentialClose = false;
  isPointerSliding = false;
  slideDragDelta = 0;
  setDraggingState(false);
}, { passive:true });

/* Wheel: one wheel gesture -> exactly one slide step (if hero hidden) */
let wheelLock = false;
window.addEventListener('wheel', function(e){
  if(heroVisible) return; // when hero visible, wheel won't affect slider
  e.preventDefault();
  if(animatingSlide || wheelLock) return;
  wheelLock = true;
  const dir = e.deltaY > 0 ? 1 : -1;
  const target = Math.max(0, Math.min(slideCount - 1, index + dir));
  animateToIndex(target, 360).then(()=>{ wheelLock = false; });
}, { passive:false });

/* Keyboard navigation */
window.addEventListener('keydown', function(e){
  if(heroVisible) return;
  if(e.key === 'ArrowDown' || e.key === 'PageDown'){
    e.preventDefault();
    animateToIndex(Math.min(slideCount - 1, index + 1), 360);
  } else if(e.key === 'ArrowUp' || e.key === 'PageUp'){
    e.preventDefault();
    animateToIndex(Math.max(0, index - 1), 360);
  } else if(e.key === 'Home'){
    e.preventDefault(); animateToIndex(0, 420);
  } else if(e.key === 'End'){
    e.preventDefault(); animateToIndex(slideCount -1, 420);
  }
});

/* Resize: cancel animations, recalc offset and snap to current */
window.addEventListener('resize', ()=>{
  cancelSlideAnimation();
  // place track at exact position for current index
  setTrackTransform(indexToOffset(index), false);
  // re-render hero transform (viewport-dependent)
  render(progress);
});

/* initialization */
(function init(){
  // start with hero visible & slider blocked
  setHeroVisible(true);
  render(0);
  // set initial track transform
  setTrackTransform(indexToOffset(index), false);
})();
})();
</script>

</body>
  </html>

<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Приглашение — split on first swipe</title>

<style>
  :root {
    --anim-duration: 700ms;
    --gap: 50vw; /* насколько уезжают створки */
  }

  html,body{
    height:100%;
    margin:0;
  }

  .slider{
    display:flex;
    flex-direction:column;
    width:100vw;
    height:100dvh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch;
  }

  .slide{
    width:100vw;
    height:100dvh;
    flex:0 0 100dvh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    overflow:hidden;
  }

  .slide img,
  .slide svg {
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
  }

  .split-slide { position:relative; background:#fff; }

  .split-side {
    position:absolute;
    inset:0;
    overflow:hidden;
    transition: transform var(--anim-duration) cubic-bezier(.22,.9,.2,1), filter var(--anim-duration);
    will-change: transform, filter;
    pointer-events:none;
  }

  .split-left { clip-path: inset(0 50% 0 0); }
  .split-right{ clip-path: inset(0 0 0 50%); }

  .split-side .media {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .split-slide .split-left,
  .split-slide .split-right {
    transform: translateX(0);
    filter: none;
  }

  .split-slide.is-split .split-left {
    transform: translateX(calc(var(--gap) * -1));
    filter: drop-shadow(-12px 0 18px rgba(0,0,0,0.12));
  }
  .split-slide.is-split .split-right {
    transform: translateX(var(--gap));
    filter: drop-shadow(12px 0 18px rgba(0,0,0,0.12));
  }

  .split-overlay {
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
  }

  .slider::-webkit-scrollbar { display:none; }
  .slider { scrollbar-width:none; -ms-overflow-style:none; }

  @media (max-width:900px){
    :root { --gap: 40vw; }
  }
</style>
</head>
<body>

<div class="slider" id="slider">

  <section class="slide split-slide" id="slide-0" aria-label="Обложка">
    <div class="split-side split-left" aria-hidden="true">
      <img class="media" src="Обложка web.svg" alt="">
    </div>

    <div class="split-side split-right" aria-hidden="true">
      <img class="media" src="Обложка web.svg" alt="">
    </div>

    <div class="split-overlay" aria-hidden="true"></div>
  </section>

  <section class="slide" aria-label="Центр">
    <img src="center.svg" alt="Макет">
  </section>

  <section class="slide" aria-label="Левая">
    <img src="Левая web.svg" alt="Макет">
  </section>

  <section class="slide" aria-label="Правая">
    <object data="Правая web.svg" type="image/svg+xml" style="width:100%;height:100%;display:block;"></object>
  </section>

</div>

<script>
(function(){
  const slider = document.getElementById('slider');
  const slide0 = document.getElementById('slide-0');
  const ANIM_CLASS = 'is-split';

  let startY = null;
  let animating = false;
  let split = false;

  // парсер CSS-переменной --anim-duration (возвращает ms)
  function getAnimMs(){
    const raw = getComputedStyle(document.documentElement).getPropertyValue('--anim-duration').trim();
    if (!raw) return 700;
    if (raw.endsWith('ms')) return parseFloat(raw);
    if (raw.endsWith('s')) return parseFloat(raw) * 1000;
    return parseFloat(raw) || 700;
  }

  const animMs = getAnimMs();
  const swipeThreshold = 40; // px минимальный свайп чтобы триггернуть

  function lockScroll(){
    slider.style.overflowY = 'hidden';
  }
  function unlockScroll(){
    slider.style.overflowY = 'auto';
  }

  function triggerSplit(){
    if (animating) return;
    animating = true;
    lockScroll();
    slide0.classList.add(ANIM_CLASS);
    // закончить анимацию через animMs
    setTimeout(() => {
      animating = false;
      split = true;
      unlockScroll();
    }, animMs + 20);
  }

  function triggerUnsplit(){
    if (animating) return;
    animating = true;
    lockScroll();
    slide0.classList.remove(ANIM_CLASS);
    setTimeout(() => {
      animating = false;
      split = false;
      unlockScroll();
    }, animMs + 20);
  }

  // touch handlers (mobile)
  slider.addEventListener('touchstart', (e) => {
    // если тач начался внутри первого слайда и слайд0 виден в вьюпорте полностью по координатам
    const touch = e.touches[0];
    startY = touch ? touch.clientY : null;
  }, {passive:true});

  slider.addEventListener('touchmove', (e) => {
    if (startY === null) return;
    const touch = e.touches[0];
    if (!touch) return;
    const dy = touch.clientY - startY;

    // свайп вверх (dy < 0) — попытка открыть
    if (dy < -swipeThreshold && !split && !animating) {
      // предотвращаем стандартную прокрутку, чтобы не "дернуло" во время анимации
      e.preventDefault();
      triggerSplit();
      startY = null;
      return;
    }

    // свайп вниз (dy > 0) — попытка закрыть (если уже открыт)
    if (dy > swipeThreshold && split && !animating) {
      e.preventDefault();
      triggerUnsplit();
      startY = null;
      return;
    }
    // иначе — позволяем браузеру обрабатывать (пассивно)
  }, {passive:false});

  slider.addEventListener('touchend', () => {
    startY = null;
  }, {passive:true});

  // wheel handler (desktop): если пользователь крутит колесом на первом слайде
  slider.addEventListener('wheel', (e) => {
    // проверяем, что начальное положение прокрутки находится на первом слайде (scrollTop близок к 0)
    const atTop = slider.scrollTop < 5;
    if (!atTop) return; // только если мы на первом элементе
    if (animating) {
      e.preventDefault();
      return;
    }

    const dy = e.deltaY;
    if (dy > 30 && !split) {
      // колесо вниз -> содержимое уезжает вверх -> мы хотим распахнуть
      e.preventDefault();
      triggerSplit();
    } else if (dy < -30 && split) {
      // колесо вверх (прокрутка вниз по документу) -> закрыть
      e.preventDefault();
      triggerUnsplit();
    }
  }, {passive:false});

  // опционально: если пользователь кликает по центру слайда — можно тоже открыть/закрыть
  slide0.addEventListener('click', (e) => {
    // не мешаем если уже анимируем
    if (animating) return;
    // при клике: если ещё не разъехано — распахнуть, иначе — закрыть
    if (!split) triggerSplit();
    else triggerUnsplit();
  });

  // Убираем IntersectionObserver — поведение теперь управляется прямыми действиями пользователя.
})();
</script>

</body>
</html>

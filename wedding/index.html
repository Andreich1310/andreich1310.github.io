<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Приглашение — зазор и тень</title>
<style>
  :root{
    --initial-gap-vw: 2;   /* видимый зазор в закрытом состоянии */
    --max-gap-vw: 50;      /* максимальный сдвиг при progress=1 */
    --hint-color: rgba(0,0,0,0.55);
    --edge-shadow-w: 8px;  /* ширина внутренней тени у краёв створок */
  }

  html,body{height:100%;margin:0;background:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;}

  /* HERO — поверх всего, ловит жесты */
  .hero{
    position:fixed;
    inset:0;
    z-index:50;
    overflow:hidden;
    pointer-events:auto;
    touch-action:none;
    background:transparent;
    display:flex;
  }

  .door{
    position:relative;
    width:50%;
    height:100%;
    overflow:hidden;
    display:block;
    background:#fff;
  }

  .door img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    -webkit-user-drag:none;
    user-select:none;
    pointer-events:none;
  }

  /* внутренняя тень у краёв дверей, чтобы показать "стык" */
  .door .inner-edge{
    position:absolute;
    top:0;
    bottom:0;
    width:var(--edge-shadow-w);
    pointer-events:none;
    z-index:60;
  }
  .left .inner-edge{ right:0; background: linear-gradient(to left, rgba(0,0,0,0.16), rgba(0,0,0,0)); }
  .right .inner-edge{ left:0;  background: linear-gradient(to right, rgba(0,0,0,0.16), rgba(0,0,0,0)); }

  /* Центр: тонкая полоска — сам зазор. Покажем её заметнее */
  .spine {
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:6px;
    transform:translateX(-50%);
    pointer-events:none;
    z-index:65;
    border-radius:3px;
    background: linear-gradient(90deg, rgba(0,0,0,0.14), rgba(255,255,255,0.02), rgba(0,0,0,0.18));
    box-shadow: 0 0 18px rgba(0,0,0,0.06);
    transition: opacity .18s linear;
  }

  /* Хинт: стрелка + текст */
  .hint {
    position: absolute;
    left:50%;
    bottom:12vh;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    z-index:70;
    pointer-events:none;
    color:var(--hint-color);
    opacity:1;
    transition:opacity .25s linear, transform .25s;
  }

  .hint svg{
    width:28px;
    height:28px;
    display:block;
    transform-origin:center;
    animation: hint-bob 1200ms infinite ease-in-out;
    opacity:0.92;
  }
  @keyframes hint-bob {
    0%{ transform:translateY(0) }
    50%{ transform:translateY(-8px) }
    100%{ transform:translateY(0) }
  }

  .hint .label{
    font-size:13px;
    background: rgba(255,255,255,0.9);
    padding:6px 10px;
    border-radius:999px;
    box-shadow:0 4px 14px rgba(0,0,0,0.06);
    color:#222;
    font-weight:500;
    letter-spacing:0.2px;
  }

  /* SLIDER под дверями */
  .slider{
    position:relative;
    z-index:1;
    height:100dvh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
  }

  .slide{
    height:100dvh;
    scroll-snap-align:start;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    display:block;
    user-select:none;
    -webkit-user-drag:none;
  }

  /* когда hero полностью скрыт, добавим класс */
  .hero.hidden { display:none; }

  /* overlays небольшой fade при частичном открытии (опционально) */
  .left .overlay,
  .right .overlay {
    position:absolute;
    inset:0;
    pointer-events:none;
    transition: opacity .18s linear;
    background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0));
  }
</style>
</head>
<body>

<!-- HERO — поверх -->
<div class="hero" id="hero" aria-hidden="false" role="region" aria-label="Обложка — потяните вверх, чтобы открыть">

  <div class="door left" id="leftDoor" aria-hidden="true">
    <img src="Обложка web.svg" alt="Обложка">
    <div class="inner-edge" aria-hidden="true"></div>
    <div class="overlay"></div>
  </div>

  <div class="door right" id="rightDoor" aria-hidden="true">
    <img src="Обложка web.svg" alt="Обложка справа">
    <div class="inner-edge" aria-hidden="true"></div>
    <div class="overlay"></div>
  </div>

  <div class="spine" id="spine" aria-hidden="true"></div>

  <div class="hint" id="hint" aria-hidden="true">
    <!-- простая стрелка вверх (SVG) -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 15 12 9 18 15"></polyline>
    </svg>
    <div class="label">Потяни вверх</div>
  </div>
</div>

<!-- SLIDER (контент под дверями) -->
<div class="slider" id="slider" aria-hidden="false">
  <!-- второй слайд (он под дверями) -->
  <section class="slide" aria-label="Центр">
    <img src="center.svg" alt="Центр">
  </section>

  <section class="slide" aria-label="Левая">
    <img src="Левая web.svg" alt="Левая">
  </section>

  <section class="slide" aria-label="Правая">
    <object data="Правая web.svg" type="image/svg+xml" style="width:100%;height:100%;display:block;"></object>
  </section>
</div>

<script>
/*
  Progressive drag + initial visible gap + hint.
  - INITIAL_GAP_VW: небольшой видимый зазор при закрытом состоянии
  - MAX_GAP_VW: сдвиг при progress=1
  - MAX_DRAG_PX: сколько пикселей свайпа вверх = progress 1
*/

(function(){
  const hero = document.getElementById('hero');
  const leftDoor = document.getElementById('leftDoor');
  const rightDoor = document.getElementById('rightDoor');
  const spine = document.getElementById('spine');
  const slider = document.getElementById('slider');
  const hint = document.getElementById('hint');

  // Настройки (можно править)
  const INITIAL_GAP_VW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--initial-gap-vw')) || 2;
  const MAX_GAP_VW     = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--max-gap-vw')) || 50;
  let MAX_DRAG_PX = Math.max(window.innerHeight * 0.6, 240);
  const WHEEL_SENSITIVITY = 0.0025;
  const OPEN_THRESHOLD = 0.98;
  const CLOSE_THRESHOLD = 0.02;

  let progress = 0; // 0..1
  let pointerActive = false;
  let startY = 0;
  let opened = false;
  let lastPointerId = null;
  let hintDismissed = false;

  // initially show hint
  hint.style.opacity = '1';
  hint.setAttribute('aria-hidden','false');

  // block slider until opened
  function blockSlider(){ slider.style.pointerEvents = 'none'; slider.style.overflowY = 'hidden'; }
  function unblockSlider(){ slider.style.pointerEvents = 'auto'; slider.style.overflowY = 'auto'; }

  blockSlider();

  function clamp(v, a=0, b=1){ return Math.max(a, Math.min(b, v)); }

  // update visual: include initial gap
  function renderProgress(){
    // compute total shift in vw from center for each side
    // shiftVW = initialGap + progress * (maxGap - initialGap)
    const shiftVW = INITIAL_GAP_VW + progress * (MAX_GAP_VW - INITIAL_GAP_VW);
    leftDoor.style.transform = `translateX(${-shiftVW}vw)`;
    rightDoor.style.transform = `translateX(${shiftVW}vw)`;

    // spine visibility: more transparent when open
    spine.style.opacity = String(1 - Math.min(1, progress * 1.1));

    // overlays fade
    const overlays = document.querySelectorAll('.overlay');
    overlays.forEach(o => o.style.opacity = String(Math.max(0, 0.28 * (1 - progress))));

    // hint fade faster
    if (!hintDismissed) {
      hint.style.opacity = String(Math.max(0, 1 - progress*1.6));
    }
  }

  function setProgress(v){
    progress = clamp(v, 0, 1);
    renderProgress();
    // if passed open threshold and not yet opened — finalize
    if (!opened && progress >= OPEN_THRESHOLD) {
      opened = true;
      // small delay so UI shows final opened position, then hide hero and enable slider
      setTimeout(() => {
        hero.classList.add('hidden');
        unblockSlider();
      }, 80);
      // mark hint dismissed
      dismissHint();
    } else if (!opened && progress > 0) {
      // keep hero visible and slider blocked
      hero.classList.remove('hidden');
      blockSlider();
    } else if (!opened && progress <= CLOSE_THRESHOLD) {
      // fully closed
      hero.classList.remove('hidden');
      blockSlider();
    }
  }

  // animate numeric progress to target (tiny ease-out)
  function animateProgressTo(target, duration = 200, cb){
    const start = performance.now();
    const from = progress;
    const diff = target - from;
    function step(t){
      const dt = t - start;
      const ratio = clamp(dt / duration, 0, 1);
      const eased = 1 - Math.pow(1 - ratio, 3);
      setProgress(from + diff * eased);
      if (ratio < 1) requestAnimationFrame(step);
      else if (cb) cb();
    }
    requestAnimationFrame(step);
  }

  // dismiss or hide hint
  function dismissHint(){
    hintDismissed = true;
    hint.style.opacity = '0';
    hint.setAttribute('aria-hidden','true');
  }

  // Pointer handlers (pointer API covers mouse + touch + pen)
  function onPointerDown(e){
    if (opened) return;
    pointerActive = true;
    lastPointerId = e.pointerId;
    startY = e.clientY;
    // when user starts interacting — hide hint soon
    dismissHint();
    try { e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId); } catch(e){}
  }

  function onPointerMove(e){
    if (!pointerActive || opened || e.pointerId !== lastPointerId) return;
    const dy = startY - e.clientY; // swipe up -> positive
    const p = clamp(dy / MAX_DRAG_PX, 0, 1);
    setProgress(p);
  }

  function onPointerUp(e){
    if (!pointerActive || e.pointerId !== lastPointerId) return;
    pointerActive = false;
    lastPointerId = null;
    // finalize: if progress > 0.45 -> open, else -> close
    if (!opened) {
      if (progress > 0.45) animateProgressTo(1, 220);
      else animateProgressTo(0, 180);
    }
  }

  // Wheel handler for desktop
  function onWheel(e){
    if (opened) return; // normal scroll after open
    e.preventDefault();
    dismissHint();
    const delta = e.deltaY * WHEEL_SENSITIVITY;
    setProgress(progress + delta);
    // if moved enough, finalize to 1
    if (progress >= OPEN_THRESHOLD) setProgress(1);
  }

  // click on hero can also open
  hero.addEventListener('click', (e) => {
    if (opened) return;
    // quick open via click
    animateProgressTo(1, 220);
    dismissHint();
  });

  // listeners
  hero.addEventListener('pointerdown', onPointerDown, {passive:false});
  window.addEventListener('pointermove', onPointerMove, {passive:false});
  window.addEventListener('pointerup', onPointerUp, {passive:false});
  window.addEventListener('pointercancel', onPointerUp, {passive:false});
  window.addEventListener('wheel', onWheel, {passive:false});

  // recompute drag length on resize (optional)
  window.addEventListener('resize', () => {
    MAX_DRAG_PX = Math.max(window.innerHeight * 0.6, 240);
    // re-render positions with current progress (in case vw->px changed)
    renderProgress();
  });

  // init
  setProgress(0);

})();
</script>
</body>
</html>

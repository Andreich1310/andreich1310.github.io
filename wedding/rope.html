<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Rope — min radius = total length (very slight bend)</title>
<style>
  html, body {
    height:100%;
    margin:0;
    background:#f3e6d3;
    overscroll-behavior: none;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  canvas {
    display:block;
    width:100%;
    height:100vh;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
/* ===== HiDPI canvas ===== */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  canvas.width = Math.max(1, Math.floor(innerWidth * dpr));
  canvas.height = Math.max(1, Math.floor(innerHeight * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', resize);
resize();

/* ===== Verlet structures ===== */
class Point {
  constructor(x,y,pinned=false){
    this.x = x; this.y = y;
    this.oldx = x; this.oldy = y;
    this.pinned = pinned;
  }
}
class Stick {
  constructor(a,b){
    this.p0 = a; this.p1 = b;
    this.length = Math.hypot(a.x - b.x, a.y - b.y);
  }
}

/* ===== Rope params ===== */
let segments = 18;        // количество узлов
let spacing = 20;         // расстояние между узлами (px)
let points = [];
let sticks = [];
let anchorX = innerWidth / 2;
let anchorY = 100;

function buildRope() {
  points = []; sticks = [];
  for (let i = 0; i < segments; i++) {
    const p = new Point(anchorX, anchorY + i * spacing, i === 0);
    points.push(p);
    if (i > 0) sticks.push(new Stick(points[i-1], points[i]));
  }
}
buildRope();

/* ===== Visual / physics params ===== */
const ropeWidth = 25;           // толщина ленты
// Rmin = длина всей ленты (spacing * (segments-1))
function computeRmin() { return spacing * Math.max(1, segments - 1); }

const gravityY = 0.7;
let swayX = 0;
let targetSwayX = 0;
// уменьшили влияние акселерометра для минимального изгиба
let swayScale = 0.02;
const swayWeightBase = 0.45;
const velocityDamping = 0.996;
let constraintIters = 14; // больше итераций — жёстче

/* compute minAngle from Rmin each frame (radians) */
function computeMinAngle() {
  const Rmin = computeRmin();
  // approx discrete minAngle ≈ spacing / Rmin
  const a = spacing / Math.max(1, Rmin);
  // clamp small lower bound for numerical stability
  return Math.max(0.002, a);
}

/* ===== Accelerometer auto-enable ===== */
function handleMotion(e) {
  const ax = e.accelerationIncludingGravity?.x || 0;
  // наклон влево -> верёвка влево (знак настроен)
  targetSwayX = -ax * swayScale;
}
function enableMotion(){
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
    DeviceMotionEvent.requestPermission()
      .then(r => { if (r === 'granted') window.addEventListener('devicemotion', handleMotion); })
      .catch(() => window.addEventListener('devicemotion', handleMotion));
  } else {
    window.addEventListener('devicemotion', handleMotion);
  }
}
enableMotion();

/* ===== Drag: only end, exact follow ===== */
let drag = null;
const DRAG_THRESHOLD = 60;

canvas.addEventListener('pointerdown', e=>{
  const end = points[points.length - 1];
  const d = Math.hypot(end.x - e.clientX, end.y - e.clientY);
  if (d <= DRAG_THRESHOLD) {
    drag = end;
    drag.x = e.clientX; drag.y = e.clientY;
    drag.oldx = e.clientX; drag.oldy = e.clientY;
    e.preventDefault();
  }
}, { passive: false });

canvas.addEventListener('pointermove', e=>{
  if (drag) {
    drag.x = e.clientX; drag.y = e.clientY;
    drag.oldx = e.clientX; drag.oldy = e.clientY;
  }
});
function endDrag(){ drag = null; }
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);
window.addEventListener('blur', endDrag);

/* Prevent pull-to-refresh on older iOS by blocking touchmove when not dragging */
(function disablePTR() {
  function tHandler(e){
    if (!drag) e.preventDefault();
  }
  document.addEventListener('touchmove', tHandler, { passive: false });
})();

/* ===== Helpers ===== */
function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
function dot(ax,ay, bx,by){ return ax*bx + ay*by; }
function rotate(x,y,theta){
  const c = Math.cos(theta), s = Math.sin(theta);
  return {x: x*c - y*s, y: x*s + y*c};
}

/* ===== Enforce minimum bend radius / angle =====
   Here minAngle is computed from Rmin = total length of the rope.
   We adjust neighbors A and C positions (if they're not pinned) to ensure angle >= minAngle.
*/
function enforceMinBend(minAngle) {
  const n = points.length;
  for (let i = 1; i < n - 1; i++) {
    const B = points[i];
    const A = points[i - 1];
    const C = points[i + 1];

    // if both neighbors pinned — skip (can't move them)
    if (A.pinned && C.pinned) continue;

    // vectors from B
    const ax = A.x - B.x, ay = A.y - B.y;
    const cx = C.x - B.x, cy = C.y - B.y;

    const na = Math.hypot(ax, ay);
    const nc = Math.hypot(cx, cy);
    if (na === 0 || nc === 0) continue;

    let cosTheta = dot(ax,ay, cx,cy) / (na * nc);
    cosTheta = clamp(cosTheta, -1, 1);
    const theta = Math.acos(cosTheta);

    if (theta < minAngle) {
      // bisector of unit vectors
      const ua = {x: ax/na, y: ay/na};
      const uc = {x: cx/nc, y: cy/nc};
      let bisX = ua.x + uc.x;
      let bisY = ua.y + uc.y;
      const bisL = Math.hypot(bisX, bisY);
      if (bisL < 1e-6) {
        // nearly opposite -> pick perpendicular to ua
        bisX = -ua.y; bisY = ua.x;
      } else {
        bisX /= bisL; bisY /= bisL;
      }

      const half = minAngle / 2;
      const cand1 = rotate(bisX, bisY, +half);
      const cand2 = rotate(bisX, bisY, -half);

      const dot1A = dot(cand1.x, cand1.y, ua.x, ua.y);
      const dot1C = dot(cand1.x, cand1.y, uc.x, uc.y);

      let dirA, dirC;
      if (dot1A >= dot1C) { dirA = cand1; dirC = cand2; }
      else { dirA = cand2; dirC = cand1; }

      // If neighbor pinned — move the non-pinned nodes (or move B if needed)
      if (!A.pinned && !C.pinned) {
        A.x = B.x + dirA.x * na;
        A.y = B.y + dirA.y * na;
        C.x = B.x + dirC.x * nc;
        C.y = B.y + dirC.y * nc;
      } else if (!A.pinned && C.pinned) {
        // move A only, keep C fixed; possibly move B slightly toward new bisector to satisfy geometry
        A.x = B.x + dirA.x * na;
        A.y = B.y + dirA.y * na;
      } else if (A.pinned && !C.pinned) {
        C.x = B.x + dirC.x * nc;
        C.y = B.y + dirC.y * nc;
      } else {
        // both pinned handled above
      }
    }
  }
}

/* ===== Physics update ===== */
function updatePhysics() {
  // smooth sway
  swayX += (targetSwayX - swayX) * 0.12;

  for (let i = 0; i < points.length; i++) {
    const p = points[i];
    if (p.pinned) continue;

    const vx = (p.x - p.oldx) * velocityDamping;
    const vy = (p.y - p.oldy) * velocityDamping;

    p.oldx = p.x; p.oldy = p.y;
    p.x += vx;
    p.y += vy + gravityY;

    const weight = i / (points.length - 1);
    p.x += swayX * (swayWeightBase + 0.1 * weight);
  }

  // basic constraints
  for (let iter = 0; iter < constraintIters; iter++) {
    for (let s of sticks) {
      const dx = s.p1.x - s.p0.x;
      const dy = s.p1.y - s.p0.y;
      let dist = Math.hypot(dx, dy);
      if (dist === 0) continue;
      const diff = (dist - s.length) / dist;
      const offx = dx * 0.5 * diff;
      const offy = dy * 0.5 * diff;

      if (!s.p0.pinned) { s.p0.x += offx; s.p0.y += offy; }
      else { s.p0.x = anchorX; s.p0.y = anchorY; }
      if (!s.p1.pinned) { s.p1.x -= offx; s.p1.y -= offy; }
    }
    // anchor
    points[0].x = anchorX; points[0].y = anchorY;
  }

  // enforce minimum bend using Rmin = total length
  const minAngle = computeMinAngle();
  enforceMinBend(minAngle);
}

/* ===== Draw ===== */
function draw() {
  ctx.fillStyle = '#f3e6d3';
  ctx.fillRect(0, 0, innerWidth, innerHeight);

  ctx.lineWidth = ropeWidth;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#c62828';
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;

  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length - 1; i++) {
    const cx = (points[i].x + points[i+1].x) / 2;
    const cy = (points[i].y + points[i+1].y) / 2;
    ctx.quadraticCurveTo(points[i].x, points[i].y, cx, cy);
  }
  const last = points[points.length - 1];
  ctx.lineTo(last.x, last.y);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8b1f1f';
  ctx.beginPath();
  ctx.arc(last.x, last.y, 6, 0, Math.PI*2);
  ctx.fill();

  // optional grab hint
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.beginPath();
  ctx.arc(last.x, last.y, DRAG_THRESHOLD, 0, Math.PI*2);
  ctx.fill();
}

/* ===== Loop ===== */
function loop(){
  updatePhysics();
  draw();
  requestAnimationFrame(loop);
}
loop();

/* keep anchor & rope on resize */
addEventListener('resize', () => {
  anchorX = innerWidth / 2;
  buildRope();
  resize();
});

</script>
</body>
</html>

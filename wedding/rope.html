<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Rope Invite Demo</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:#f3e6d3;
  font-family:Inter,system-ui,Arial;
}

canvas{
  display:block;
  width:100%;
  height:100vh;
}
</style>
</head>

<body>
<canvas id="c"></canvas>

<script>

/* canvas */

const canvas = document.getElementById("c")
const ctx = canvas.getContext("2d")

function resize(){
  canvas.width = innerWidth
  canvas.height = innerHeight
}

addEventListener("resize",resize)
resize()


/* physics classes */

class Point{
  constructor(x,y,pinned=false){
    this.x=x
    this.y=y
    this.oldx=x
    this.oldy=y
    this.pinned=pinned
  }
}

class Stick{
  constructor(a,b){
    this.p0=a
    this.p1=b
    this.length=Math.hypot(a.x-b.x,a.y-b.y)
  }
}


/* rope */

let segments = 18
let spacing = 20

let points=[]
let sticks=[]

let anchorX = canvas.width/2
let anchorY = 100

function buildRope(){

  points=[]
  sticks=[]

  for(let i=0;i<segments;i++){

    const p = new Point(
      anchorX,
      anchorY + i*spacing,
      i===0
    )

    points.push(p)

    if(i>0){
      sticks.push(new Stick(points[i-1],p))
    }
  }
}

buildRope()


/* physics */

const gravityY = 0.7

let swayX=0
let targetSwayX=0

const swayScale = 0.033
const damping = 0.995


/* accelerometer */

function handleMotion(e){

  const ax = e.accelerationIncludingGravity?.x || 0

  targetSwayX = -ax * swayScale
}

function enableMotion(){

  if(typeof DeviceMotionEvent !== "undefined" &&
     typeof DeviceMotionEvent.requestPermission === "function"){

    DeviceMotionEvent.requestPermission()
      .then(r=>{
        if(r==="granted"){
          window.addEventListener("devicemotion",handleMotion)
        }
      })

  }else{

    window.addEventListener("devicemotion",handleMotion)

  }
}

enableMotion()


/* drag */

let drag=null

canvas.onpointerdown = e=>{

  let min=30

  for(let p of points){

    const d=Math.hypot(p.x-e.clientX,p.y-e.clientY)

    if(d<min){
      drag=p
      break
    }
  }
}

canvas.onpointermove = e=>{
  if(drag){
    drag.x=e.clientX
    drag.y=e.clientY
  }
}

canvas.onpointerup=()=>drag=null


/* physics update */

function update(){

  swayX += (targetSwayX - swayX) * 0.12

  for(let i=0;i<points.length;i++){

    const p = points[i]

    if(p.pinned) continue

    let vx=(p.x-p.oldx)*damping
    let vy=(p.y-p.oldy)*damping

    p.oldx=p.x
    p.oldy=p.y

    p.x += vx
    p.y += vy + gravityY

    const weight=i/(points.length-1)

    p.x += swayX*(0.9+0.1*weight)
  }


  for(let k=0;k<6;k++){

    for(let s of sticks){

      let dx=s.p1.x-s.p0.x
      let dy=s.p1.y-s.p0.y

      let dist=Math.hypot(dx,dy)

      let diff=(dist-s.length)/dist

      let offx=dx*0.5*diff
      let offy=dy*0.5*diff

      if(!s.p0.pinned){
        s.p0.x+=offx
        s.p0.y+=offy
      }else{
        s.p0.x=anchorX
        s.p0.y=anchorY
      }

      if(!s.p1.pinned){
        s.p1.x-=offx
        s.p1.y-=offy
      }
    }
  }

}


/* draw */

function draw(){

  ctx.fillStyle="#f3e6d3"
  ctx.fillRect(0,0,canvas.width,canvas.height)

  ctx.strokeStyle="#c62828"
  ctx.lineWidth=5
  ctx.lineCap="round"

  ctx.beginPath()

  ctx.moveTo(points[0].x,points[0].y)

  for(let i=1;i<points.length-1;i++){

    const cx=(points[i].x+points[i+1].x)/2
    const cy=(points[i].y+points[i+1].y)/2

    ctx.quadraticCurveTo(points[i].x,points[i].y,cx,cy)

  }

  const last=points[points.length-1]

  ctx.lineTo(last.x,last.y)

  ctx.stroke()


  /* card */

  const cardW=160
  const cardH=90

  const end=points[points.length-1]

  const prev=points[points.length-2]

  const angle=Math.atan2(end.y-prev.y,end.x-prev.x)

  ctx.save()

  ctx.translate(end.x,end.y+10)
  ctx.rotate(angle*0.5)

  ctx.fillStyle="#c62828"

  ctx.beginPath()
  ctx.arc(0,-10,5,0,Math.PI*2)
  ctx.fill()

  ctx.fillStyle="#ffffff"

  roundRect(ctx,-cardW/2,0,cardW,cardH,12,true,false)

  ctx.fillStyle="#333"
  ctx.font="600 14px Inter"

  ctx.fillText("Приглашение",-cardW/2+14,24)

  ctx.font="12px Inter"

  ctx.fillText("Ждём вас на нашем дне",-cardW/2+14,46)

  ctx.restore()

}


/* rounded rect */

function roundRect(ctx,x,y,w,h,r,fill,stroke){

  ctx.beginPath()

  ctx.moveTo(x+r,y)
  ctx.lineTo(x+w-r,y)
  ctx.quadraticCurveTo(x+w,y,x+w,y+r)

  ctx.lineTo(x+w,y+h-r)
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)

  ctx.lineTo(x+r,y+h)
  ctx.quadraticCurveTo(x,y+h,x,y+h-r)

  ctx.lineTo(x,y+r)
  ctx.quadraticCurveTo(x,y,x+r,y)

  ctx.closePath()

  if(fill) ctx.fill()
  if(stroke) ctx.stroke()
}


/* loop */

function loop(){

  update()
  draw()

  requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
